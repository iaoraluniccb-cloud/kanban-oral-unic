function toggleInbox() {
  const body = document.getElementById('inbox-body');
  const toggle = document.getElementById('inbox-toggle');
  body.classList.toggle('hidden');
  toggle.classList.toggle('open');
}

function renderInbox() {
  const delegations = getDelegations().filter(d => d && d.toUserId === currentUser.id && d.status === 'pending');
  const notifs = getNotifications(currentUser.id).filter(n => n && n.id);
  const unreadNotifs = notifs.filter(n => !n.read && n.type !== 'incoming_delegation');
  const total = delegations.length + unreadNotifs.length;

  const badge = document.getElementById('inbox-badge-count');
  if (total > 0) { badge.classList.remove('hidden'); badge.textContent = total; }
  else { badge.classList.add('hidden'); }

  // Delegations to accept
  const pendingEl = document.getElementById('pending-delegations');
  if (delegations.length === 0) {
    pendingEl.innerHTML = '';
  } else {
    pendingEl.innerHTML = `<div style="font-size:0.8rem;font-weight:700;color:var(--gray-500);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Delegações pendentes</div>` +
      delegations.map(d => `
        <div class="inbox-item" id="deleg-item-${d.id}">
          ${avatarHtml(d.fromUserId, d.fromUserName, getUserById(d.fromUserId)?.color||'#888', 'avatar-sm')}
          <div class="inbox-item-content">
            <div class="inbox-item-title">${escHtml(d.cardTitle)}</div>
            <div class="inbox-item-sub">De: ${escHtml(d.fromUserName)} · ${timeAgo(d.createdAt)}</div>
            ${d.message ? `<div class="inbox-item-msg">"${escHtml(d.message)}"</div>` : ''}
            <div class="inbox-actions">
              <button class="btn-accept" onclick="respondDelegation('${d.id}','accepted')">✓ Aceitar</button>
              <button class="btn-refuse" onclick="respondDelegation('${d.id}','refused')">✕ Recusar</button>
            </div>
          </div>
        </div>
      `).join('');
  }

  // Notifications
  const notifEl = document.getElementById('notifications-list');
  const displayNotifs = notifs.filter(n => n.type !== 'incoming_delegation');
  if (displayNotifs.length === 0) {
    notifEl.innerHTML = delegations.length === 0 ? `<div style="text-align:center;color:var(--gray-400);padding:20px;font-size:0.85rem;">Nenhuma notificação</div>` : '';
  } else {
    notifEl.innerHTML = `<div style="font-size:0.8rem;font-weight:700;color:var(--gray-500);margin-bottom:8px;margin-top:${delegations.length?'12px':'0'};text-transform:uppercase;letter-spacing:0.5px;">Notificações</div>` +
      displayNotifs.map(n => `
        <div class="notif-item ${n.type==='delegation_accepted'?'accepted':n.type==='delegation_refused'?'refused':''}">
          <button class="notif-dismiss" onclick="dismissNotif('${n.id}')">✕</button>
          ${n.type === 'delegation_accepted' ? `<strong>${escHtml(n.toName)}</strong> aceitou a tarefa "<em>${escHtml(n.cardTitle)}</em>".` : ''}
          ${n.type === 'delegation_refused' ? `<strong>${escHtml(n.toName)}</strong> recusou a tarefa "<em>${escHtml(n.cardTitle)}</em>"${n.reason ? ': <em>'+escHtml(n.reason)+'</em>' : ''}.` : ''}
          ${n.type === 'overdue_alert' ? `${escHtml(n.message)}` : ''}
          ${n.type === 'task_done' ? `${escHtml(n.message)}` : ''}
          ${n.type === 'shared_card' ? `${escHtml(n.message)}` : ''}
          ${n.type === 'cobrar_chat' ? `<span style="cursor:pointer;text-decoration:underline;" onclick="openCobrarChatFromNotif('${n.refId}')">${escHtml(n.message)}</span>` : ''}
          <div style="font-size:0.72rem;color:var(--gray-400);margin-top:4px;">${timeAgo(n.createdAt)}</div>
        </div>
      `).join('');
  }

  updateVelloBadge();
}

function respondDelegation(delegId, response) {
  const delegations = getDelegations();
  const deleg = delegations.find(d => d.id === delegId);
  if (!deleg) return;
  deleg.status = response;
  saveDelegations(delegations);

  // Update card on current user's board
  const myCards = getCards(currentUser.id);
  const card = myCards.find(c => c.delegationId === delegId);
  if (card) {
    if (response === 'accepted') {
      card.delegationStatus = 'accepted';
      // mantém isDelegation=true para syncDoneToOrigin funcionar ao concluir
    } else {
      // Remove card if refused
      const idx = myCards.indexOf(card);
      myCards.splice(idx, 1);
    }
    saveCards(currentUser.id, myCards);
  }

  // Remove incoming_delegation notification
  const myNotifs = getNotifications(currentUser.id).filter(n => !(n.type === 'incoming_delegation' && n.delegationId === delegId));
  saveNotifications(currentUser.id, myNotifs);

  // Notify original sender
  const senderNotifs = getNotifications(deleg.fromUserId);
  senderNotifs.push({
    id: genId(),
    type: response === 'accepted' ? 'delegation_accepted' : 'delegation_refused',
    delegationId: delegId,
    toName: currentUser.name,
    cardTitle: deleg.cardTitle,
    read: false,
    createdAt: new Date().toISOString()
  });
  saveNotifications(deleg.fromUserId, senderNotifs);

  showToast(response === 'accepted' ? 'Delegação aceita!' : 'Delegação recusada.', response === 'accepted' ? 'success' : 'info');
  renderVello();
}

async function saveDismissedAlerts(userId, refIds) {
  if (!window.__db) return;
  const ref = window.__doc('ou_dismissed_alerts', userId);
  await window.__setDoc(ref, { ids: JSON.stringify([...refIds]), updatedAt: new Date().toISOString() });
}

function getDismissedAlerts(userId) {
  return window._cache.dismissedAlerts?.[userId] || new Set();
}

async function loadDismissedAlerts(userId) {
  if (!window.__db) return;
  if (!window._cache.dismissedAlerts) window._cache.dismissedAlerts = {};
  try {
    const snap = await window.__getDoc(window.__doc('ou_dismissed_alerts', userId));
    if (snap.exists()) {
      const ids = JSON.parse(snap.data().ids || '[]');
      window._cache.dismissedAlerts[userId] = new Set(ids);
    } else {
      window._cache.dismissedAlerts[userId] = new Set();
    }
  } catch(e) {
    window._cache.dismissedAlerts[userId] = new Set();
  }
}

function dismissNotif(notifId) {
  const allNotifs = getNotifications(currentUser.id);
  const dismissed = allNotifs.find(n => n.id === notifId);
  const notifs = allNotifs.filter(n => n.id !== notifId);
  saveNotifications(currentUser.id, notifs);

  // Se for overdue_alert, registra o refId como permanentemente dispensado
  if (dismissed && dismissed.type === 'overdue_alert' && dismissed.refId) {
    if (!window._cache.dismissedAlerts) window._cache.dismissedAlerts = {};
    if (!window._cache.dismissedAlerts[currentUser.id]) window._cache.dismissedAlerts[currentUser.id] = new Set();
    window._cache.dismissedAlerts[currentUser.id].add(dismissed.refId);
    saveDismissedAlerts(currentUser.id, window._cache.dismissedAlerts[currentUser.id]);
  }

  renderInbox();
}

function updateVelloBadge() {
  const delegations = getDelegations().filter(d => d.toUserId === currentUser.id && d.status === 'pending');
  const unreadNotifs = getNotifications(currentUser.id).filter(n => !n.read && n.type !== 'incoming_delegation');
  const total = delegations.length + unreadNotifs.length;
  const badge = document.getElementById('vello-badge');
  if (total > 0) { badge.classList.remove('hidden'); badge.textContent = total; }
  else { badge.classList.add('hidden'); }
}

function checkOverdueAndNotify() {
  const today = new Date(); today.setHours(0,0,0,0);
  const allCards = window._cache.cards || {};
  const overdueCards = [];

  Object.entries(allCards).forEach(([ownerId, cardArray]) => {
    if (!Array.isArray(cardArray)) return;
    cardArray.forEach(card => {
      if (!card.dueDate || card.column === 'done') return;
      const due = card.dueTime
        ? new Date(card.dueDate + 'T' + card.dueTime + ':00')
        : new Date(card.dueDate + 'T23:59:59');
      if (due <= new Date()) overdueCards.push({ ...card, _ownerId: ownerId });
    });
  });

  if (overdueCards.length === 0) return;

  // Monta mapa: recipientId → Set de cards a notificar
  const targetMap = {}; // { recipientId: Set of cards }

  function addTarget(recipientId, card) {
    if (!targetMap[recipientId]) targetMap[recipientId] = new Map();
    targetMap[recipientId].set(card.id, card);
  }

  overdueCards.forEach(card => {
    // ADMs sempre recebem tudo
    addTarget('thais', card);
    addTarget('dra_mone', card);

    // Quem delegou o card também recebe (se for delegação)
    if (card.isDelegation && card.delegatedFrom && card.delegatedFrom !== 'thais' && card.delegatedFrom !== 'dra_mone') {
      addTarget(card.delegatedFrom, card);
    }

    // Supervisores recebem dos seus supervisionados
    Object.entries(SUPERVISORS).forEach(([supervisorId, subordinates]) => {
      if (subordinates.includes(card._ownerId)) addTarget(supervisorId, card);
    });
  });

  Object.entries(targetMap).forEach(([recipientId, cardMap]) => {
    const existingNotifs = getNotifications(recipientId);
    const existingIds = new Set(existingNotifs.filter(n => n.type === 'overdue_alert').map(n => n.refId));
    const dismissedIds = getDismissedAlerts(recipientId);
    const newNotifs = [...existingNotifs];
    let added = 0;

    cardMap.forEach(card => {
      if (existingIds.has(card.id)) return;
      if (dismissedIds.has(card.id)) return; // já foi dispensado pelo usuário
      const ownerUser = getUserById(card._ownerId);
      const ownerName = ownerUser ? ownerUser.name : card._ownerId;
      // Se for o delegador recebendo, mensagem personalizada
      const isDelegator = card.isDelegation && card.delegatedFrom === recipientId;
      const msg = isDelegator
        ? `⚠️ ${ownerName} está com "${card.title}" (que você delegou) em atraso (prazo: ${formatDate(card.dueDate)})`
        : `⚠️ ${ownerName} está com "${card.title}" em atraso (prazo: ${formatDate(card.dueDate)})`;
      newNotifs.push({
        id: 'ovd_' + recipientId + '_' + card.id + '_' + Date.now(),
        type: 'overdue_alert',
        refId: card.id,
        message: msg,
        createdAt: new Date().toISOString(),
        read: false
      });
      added++;
    });

    if (added > 0) saveNotifications(recipientId, newNotifs);
  });
}

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const EVENT_TYPES = { reuniao: 'Reunião', compromisso: 'Compromisso', prazo: 'Prazo', pessoal: 'Pessoal', outro: 'Outro' };

function setCalView(v) {
  calView = v;
  document.getElementById('view-btn-month').classList.toggle('active', v === 'month');
  document.getElementById('view-btn-week').classList.toggle('active', v === 'week');
  document.getElementById('month-view-wrapper').style.display = v === 'month' ? '' : 'none';
  document.getElementById('week-view-wrapper').style.display = v === 'week' ? '' : 'none';
  if (v === 'week' && !calWeekStart) {
    const today = new Date();
    today.setHours(0,0,0,0);
    calWeekStart = new Date(today);
    calWeekStart.setDate(today.getDate() - today.getDay());
  }
  selectedDay = null;
  document.getElementById('day-detail-panel').innerHTML = '';
  renderCalendar();
}

function calNavigatePrev() {
  if (calView === 'week') {
    calWeekStart.setDate(calWeekStart.getDate() - 7);
    renderCalendar();
  } else {
    changeMonth(-1);
  }
}

function calNavigateNext() {
  if (calView === 'week') {
    calWeekStart.setDate(calWeekStart.getDate() + 7);
    renderCalendar();
  } else {
    changeMonth(1);
  }
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  selectedDay = null;
  document.getElementById('day-detail-panel').innerHTML = '';
  renderCalendar();
}

function goToToday() {
  calYear = new Date().getFullYear();
  calMonth = new Date().getMonth();
  const today = new Date();
  today.setHours(0,0,0,0);
  calWeekStart = new Date(today);
  calWeekStart.setDate(today.getDate() - today.getDay());
  selectedDay = null;
  document.getElementById('day-detail-panel').innerHTML = '';
  renderCalendar();
}

function renderWeekView() {
  if (!calWeekStart) {
    const today = new Date();
    today.setHours(0,0,0,0);
    calWeekStart = new Date(today);
    calWeekStart.setDate(today.getDate() - today.getDay());
  }

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(calWeekStart);
    d.setDate(calWeekStart.getDate() + i);
    days.push(d);
  }

  const weekEndDate = days[6];
  const startLabel = calWeekStart.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
  const endLabel = weekEndDate.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', year: 'numeric' });
  document.getElementById('agenda-month-label').textContent = `${startLabel} – ${endLabel}`;

  const events = getVisibleEvents();
  const today = new Date(); today.setHours(0,0,0,0);
  const WEEK_DAYS_SHORT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const HOURS = [];
  for (let h = 0; h < 24; h++) HOURS.push(h);

  // Build header row
  let headerHtml = `<div style="display:grid;grid-template-columns:48px repeat(7,1fr);background:var(--navy);">
    <div class="week-time-header"></div>
    ${days.map(d => {
      const isToday = d.getTime() === today.getTime();
      const dateStr = formatDateStr(d.getFullYear(), d.getMonth(), d.getDate());
      return `<div class="week-day-header ${isToday ? 'today' : ''}" onclick="selectDay('${dateStr}')">
        <div style="font-size:0.72rem;opacity:0.75;">${WEEK_DAYS_SHORT[d.getDay()]}</div>
        <span class="week-day-number">${d.getDate()}</span>
      </div>`;
    }).join('')}
  </div>`;

  // All-day events row
  const allDayEventsPerDay = days.map(d => {
    const dateStr = formatDateStr(d.getFullYear(), d.getMonth(), d.getDate());
    return events.filter(e => e.date === dateStr && !e.startTime);
  });
  const hasAllDay = allDayEventsPerDay.some(arr => arr.length > 0);
  let allDayHtml = '';
  if (hasAllDay) {
    allDayHtml = `<div style="display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:2px solid var(--gray-200);">
      <div class="week-allday-label">dia todo</div>
      ${allDayEventsPerDay.map(arr => `<div class="week-allday-cell">
        ${arr.map(e => `<div class="day-event-pill event-${e.type}" style="margin-bottom:2px;${e.gcalColor ? `background:${e.gcalColor};color:#1e293b;` : ''}" onclick="showEventDetail('${e.id}')">${escHtml(e.title)}</div>`).join('')}
      </div>`).join('')}
    </div>`;
  }

  // Timed rows — build absolute-positioned event blocks per day per column
  // Pre-compute timed events per day
  const timedPerDay = days.map(d => {
    const dateStr = formatDateStr(d.getFullYear(), d.getMonth(), d.getDate());
    return events.filter(e => e.date === dateStr && e.startTime);
  });

  // Find first hour with events (or 7 as default)
  let firstHour = 7;
  timedPerDay.forEach(arr => arr.forEach(e => {
    const h = parseInt((e.startTime||'00:00').split(':')[0], 10);
    if (h < firstHour) firstHour = h;
  }));
  firstHour = Math.max(0, firstHour - 1);

  const slotH = 56; // px per hour slot

  let gridRows = HOURS.slice(firstHour).map(h => {
    const label = h === 0 ? '' : `${String(h).padStart(2,'0')}:00`;
    return `<div style="display:grid;grid-template-columns:48px repeat(7,1fr);min-height:${slotH}px;border-bottom:1px solid var(--gray-200);">
      <div class="week-time-slot">${label}</div>
      ${days.map(() => `<div style="border-right:1px solid var(--gray-200);min-height:${slotH}px;"></div>`).join('')}
    </div>`;
  }).join('');

  const inner = document.getElementById('week-view-inner');
  inner.innerHTML = headerHtml + allDayHtml +
    `<div id="week-scroll" style="overflow-y:auto;max-height:600px;">
      <div id="week-body" style="position:relative;">
        ${gridRows}
        <div id="week-overlay" style="display:grid;grid-template-columns:48px repeat(7,1fr);position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;">
          <div></div>
          ${days.map((d,i) => {
            const dateStr = formatDateStr(d.getFullYear(), d.getMonth(), d.getDate());
            return `<div class="week-drag-col" data-date="${dateStr}" data-col="${i}"
              style="position:relative;min-height:${slotH*(24-firstHour)}px;border-right:1px solid var(--gray-200);pointer-events:auto;cursor:crosshair;">
              ${timedPerDay[i].map(e => {
                const [sh, sm] = (e.startTime||'00:00').split(':').map(Number);
                const [eh, em] = e.endTime ? e.endTime.split(':').map(Number) : [sh+1, sm];
                const topPx = (sh - firstHour + sm/60) * slotH;
                const heightPx = Math.max(((eh - sh) + (em - sm)/60) * slotH, 22);
                const bgColor = e.gcalColor || null;
                const cls = bgColor ? '' : `event-${e.type}`;
                return `<div class="week-event-block day-event-pill ${cls}"
                  style="top:${topPx}px;height:${heightPx}px;${bgColor ? `background:${bgColor};color:#1e293b;` : ''}"
                  onclick="event.stopPropagation();showEventDetail('${e.id}')">
                  <strong>${e.startTime}</strong> ${escHtml(e.title)}
                </div>`;
              }).join('')}
            </div>`;
          }).join('')}
        </div>
        <div id="week-drag-preview" style="display:none;position:absolute;background:rgba(139,45,66,0.25);border:2px solid var(--navy);border-radius:4px;pointer-events:none;z-index:10;left:0;width:0;"></div>
      </div>
    </div>`;

  // ---- drag-to-create ----
  _weekSlotH = slotH;
  _weekFirstHour = firstHour;
  _weekDragState = null;

  document.querySelectorAll('.week-drag-col').forEach(col => {
    col.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (e.target.classList.contains('week-event-block') || e.target.closest('.week-event-block')) return;
      e.preventDefault();
      const rect = col.getBoundingClientRect();
      const scroll = document.getElementById('week-scroll')?.scrollTop || 0;
      const startY = e.clientY - rect.top + scroll;
      _weekDragState = { col, date: col.dataset.date, startY, endY: startY + _weekSlotH };
      weekRenderDragPreview();
    });
  });
}

function weekPxToTime(py) {
  const totalMins = (py / _weekSlotH) * 60 + _weekFirstHour * 60;
  const h = Math.floor(totalMins / 60);
  const m = Math.round((totalMins % 60) / 15) * 15;
  const hh = Math.min(h + (m === 60 ? 1 : 0), 23);
  const mm = m === 60 ? 0 : m;
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

function weekRenderDragPreview() {
  if (!_weekDragState) return;
  const preview = document.getElementById('week-drag-preview');
  const body = document.getElementById('week-body');
  if (!preview || !body) return;
  const minY = Math.min(_weekDragState.startY, _weekDragState.endY);
  const maxY = Math.max(_weekDragState.startY, _weekDragState.endY);
  const colRect = _weekDragState.col.getBoundingClientRect();
  const bodyRect = body.getBoundingClientRect();
  preview.style.display = 'block';
  preview.style.left = (colRect.left - bodyRect.left + 2) + 'px';
  preview.style.width = (colRect.width - 4) + 'px';
  preview.style.top = minY + 'px';
  preview.style.height = Math.max(maxY - minY, _weekSlotH / 2) + 'px';
  preview.title = `${weekPxToTime(minY)} – ${weekPxToTime(Math.max(maxY, minY + _weekSlotH / 2))}`;
}

document.addEventListener('mousemove', function(e) {
  if (!_weekDragState) return;
  const col = _weekDragState.col;
  const rect = col.getBoundingClientRect();
  const scroll = document.getElementById('week-scroll')?.scrollTop || 0;
  _weekDragState.endY = e.clientY - rect.top + scroll;
  weekRenderDragPreview();
});

document.addEventListener('mouseup', function(e) {
  if (!_weekDragState) return;
  const preview = document.getElementById('week-drag-preview');
  if (preview) preview.style.display = 'none';
  const minY = Math.min(_weekDragState.startY, _weekDragState.endY);
  const maxY = Math.max(_weekDragState.startY, _weekDragState.endY);
  const startTime = weekPxToTime(minY);
  const endTime = weekPxToTime(Math.max(maxY, minY + _weekSlotH / 2));
  const date = _weekDragState.date;
  _weekDragState = null;
  if (startTime === endTime) return;
  openEventModal(null, date, startTime, endTime);
});

function getVisibleEvents() {
  const all = getAgenda();
  return all.filter(e => {
    // Evento pessoal → só o criador vê
    if (e.type === 'pessoal') return e.createdBy === currentUser.id;
    // Evento para todos → todos veem
    if (e.assignedTo === 'all') return true;
    // Próprio criador sempre vê o próprio evento
    if (e.createdBy === currentUser.id) return true;
    // Participante explicitamente incluído vê o evento
    if (Array.isArray(e.assignedTo) && e.assignedTo.includes(currentUser.id)) return true;
    return false;
  });
}

function renderPendentes() {
  const wrap = document.getElementById('pendentes-content');
  if (!wrap) return;

  const allCards = window._cache.cards || {};
  const now = new Date();
  const pendList = []; // { card, ownerId, ownerName, ownerColor, overdue }

  Object.entries(allCards).forEach(([ownerId, cardArray]) => {
    if (!Array.isArray(cardArray)) return;
    if (ownerId === 'dra_mone') return; // não lista os próprios cards da Mone
    const owner = getUserById(ownerId);
    cardArray.forEach(card => {
      if (card.column === 'done') return;
      if (card.sharedOriginId) return; // ignora cópias compartilhadas
      const hasDate = !!card.dueDate;
      let overdue = false;
      if (hasDate) {
        const due = card.dueTime
          ? new Date(card.dueDate + 'T' + card.dueTime + ':00')
          : new Date(card.dueDate + 'T23:59:59');
        overdue = due <= now;
      }
      pendList.push({ card, ownerId, ownerName: owner ? owner.name : ownerId, ownerColor: owner?.color || '#888', overdue });
    });
  });

  // Atualiza badge
  const overdueCnt = pendList.filter(p => p.overdue).length;
  const badge = document.getElementById('pendentes-badge');
  if (badge) {
    if (overdueCnt > 0) { badge.textContent = overdueCnt; badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
  }

  if (pendList.length === 0) {
    wrap.innerHTML = `<div class="pendentes-empty">✅ Nenhuma tarefa pendente na equipe.</div>`;
    return;
  }

  // Ordena: primeiro atrasados, depois por nome do dono
  pendList.sort((a, b) => {
    if (a.overdue !== b.overdue) return a.overdue ? -1 : 1;
    return a.ownerName.localeCompare(b.ownerName);
  });

  // Agrupa por dono
  const byOwner = new Map();
  pendList.forEach(p => {
    if (!byOwner.has(p.ownerId)) byOwner.set(p.ownerId, { name: p.ownerName, color: p.ownerColor, items: [] });
    byOwner.get(p.ownerId).items.push(p);
  });

  const totalPend = pendList.length;
  let html = `<div class="pendentes-header">⚠️ Tarefas Pendentes da Equipe <span class="count">${totalPend} tarefa${totalPend !== 1 ? 's' : ''}</span></div>`;

  byOwner.forEach(({ name, color, items }) => {
    const overdueItems = items.filter(i => i.overdue);
    html += `
      <div class="pendentes-person">
        <div class="pendentes-person-header">
          <div class="pendentes-person-dot" style="background:${color}"></div>
          <span class="pendentes-person-name">${escHtml(name)}</span>
          <span class="pendentes-person-count">${items.length} tarefa${items.length !== 1 ? 's' : ''}${overdueItems.length > 0 ? ` · <span style="color:#ef4444;font-weight:700;">${overdueItems.length} em atraso</span>` : ''}</span>
        </div>
        ${items.map(({ card, ownerId, overdue }) => {
          const chatId = 'cobrar_' + ownerId + '_' + card.id;
          const chats = window._cache.chats || {};
          const hasChat = !!(chats[chatId] && chats[chatId].length > 0);
          const unread = window._cache.chatUnread?.[chatId]?.[currentUser?.id];
          const btnClass = 'pendentes-cobrar-btn' + (hasChat ? ' has-chat' : '');
          const btnLabel = unread ? `💬 Chat (${unread})` : hasChat ? '💬 Ver chat' : '💬 Cobrar';
          return `
            <div class="pendentes-card-row">
              <div class="pendentes-card-info">
                <div class="pendentes-card-title">${escHtml(card.title)}</div>
                <div class="pendentes-card-meta">
                  ${overdue ? `🔴 Em atraso` : '🟡 Pendente'}
                  ${card.dueDate ? ` · 📅 ${formatDate(card.dueDate)}` : ' · Sem prazo'}
                  ${card.priority ? ` · ${card.priority === 'high' ? '🔥 Alta' : card.priority === 'medium' ? '⚡ Média' : '🔵 Baixa'}` : ''}
                </div>
              </div>
              <button class="${btnClass}" onclick="openCobrarChat('${chatId}','${escHtml(card.title).replace(/'/g,"\\'")}','${ownerId}','${card.id}')">${btnLabel}</button>
            </div>`;
        }).join('')}
      </div>`;
  });

  wrap.innerHTML = html;
}

async function openCobrarChat(chatId, cardTitle, ownerId, cardId) {
  const chats = window._cache.chats || {};
  const messages = chats[chatId] || [];

  // Marca como lido
  if (!window._cache.chatUnread) window._cache.chatUnread = {};
  const unread = { ...(window._cache.chatUnread[chatId] || {}) };
  if (unread[currentUser.id]) {
    delete unread[currentUser.id];
    window._cache.chatUnread[chatId] = unread;
    if (window.__setDoc) window.__setDoc(window.__doc('ou_chats', chatId), { messages: JSON.stringify(messages), unread: JSON.stringify(unread) }).catch(() => null);
  }

  const ownerUser = getUserById(ownerId);
  const ownerName = ownerUser ? ownerUser.name : ownerId;

  const html = `
    <div class="modal-overlay" id="cobrar-chat-modal" onclick="closeOnOverlay(event,'cobrar-chat-modal')">
      <div class="modal" role="dialog" style="max-width:480px;">

          <span class="modal-title">💬 Cobrar: ${escHtml(cardTitle)}</span>

              ? `<div style="text-align:center;color:var(--gray-400);padding:24px;font-size:0.85rem;">Nenhuma mensagem ainda.</div>`

                <div class="chat-bubble${m.userId === currentUser.id ? ' mine' : ''}">

                  <div>${escHtml(m.text)}</div>
                </div>`).join('')}
          </div>
          <div class="chat-input-row">
            <input type="text" id="cobrar-msg-input" placeholder="Digite sua cobrança..." onkeydown="if(event.key==='Enter')sendCobrarMsg('${chatId}','${ownerId}','${cardId}')"/>
            <button class="chat-send-btn" onclick="sendCobrarMsg('${chatId}','${ownerId}','${cardId}')">Enviar</button>
          </div>
        </div>

    </div>`;
  renderModal(html);
  setTimeout(() => {
    const el = document.getElementById('cobrar-chat-messages');
    if (el) el.scrollTop = el.scrollHeight;
    document.getElementById('cobrar-msg-input')?.focus();
  }, 100);
}

function openCobrarChatFromNotif(chatId) {
  // chatId formato: cobrar_ownerId_cardId
  const parts = chatId.split('_');
  const ownerId = parts[1];
  const cardId = parts.slice(2).join('_');
  const allCards = window._cache.cards || {};
  const ownerCards = allCards[ownerId] || [];
  const card = ownerCards.find(c => c.id === cardId);
  const title = card ? card.title : 'Tarefa';
  openCobrarChat(chatId, title, ownerId, cardId);
}

async function sendCobrarMsg(chatId, ownerId, cardId) {
  const input = document.getElementById('cobrar-msg-input');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';

  if (!window._cache.chats) window._cache.chats = {};
  if (!window._cache.chats[chatId]) window._cache.chats[chatId] = [];
  const msg = { id: genId(), userId: currentUser.id, userName: currentUser.name, text, createdAt: new Date().toISOString() };
  window._cache.chats[chatId].push(msg);

  if (!window._cache.chatUnread) window._cache.chatUnread = {};
  const unread = { ...(window._cache.chatUnread[chatId] || {}) };
  // Marca como não lido para o dono do card
  unread[ownerId] = (unread[ownerId] || 0) + 1;
  window._cache.chatUnread[chatId] = unread;

  if (window.__setDoc) {
    await window.__setDoc(window.__doc('ou_chats', chatId), {
      messages: JSON.stringify(window._cache.chats[chatId]),
      unread: JSON.stringify(unread)
    }).catch(() => null);
  }

  // Notifica o dono do card
  const ownerNotifs = getNotifications(ownerId);
  const alreadyHasNotif = ownerNotifs.some(n => n.type === 'cobrar_chat' && n.refId === chatId);
  if (!alreadyHasNotif) {
    ownerNotifs.push({
      id: genId(),
      type: 'cobrar_chat',
      refId: chatId,
      message: `💬 ${escHtml(currentUser.name)} cobrou você sobre uma tarefa pendente`,
      read: false,
      createdAt: new Date().toISOString()
    });
    saveNotifications(ownerId, ownerNotifs);
  }

  // Re-renderiza o chat aberto
  const el = document.getElementById('cobrar-chat-messages');
  if (el) {
    el.innerHTML = window._cache.chats[chatId].map(m => `
      <div class="chat-bubble${m.userId === currentUser.id ? ' mine' : ''}">
        <div class="chat-author">${escHtml(m.userName)} · ${timeAgo(m.createdAt)}</div>
        <div>${escHtml(m.text)}</div>
      </div>`).join('');
    el.scrollTop = el.scrollHeight;
  }
  input?.focus();
}

function renderCalendar() {
  if (calView === 'week') {
    renderWeekView();
    renderOverdueTeamPanel();
    return;
  }
  document.getElementById('agenda-month-label').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const events = getVisibleEvents();

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();
  today.setHours(0,0,0,0);

  const cells = [];
  // Previous month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: prevMonthDays - i, month: calMonth - 1, year: calYear, other: true });
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, month: calMonth, year: calYear, other: false });
  }
  // Next month padding
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++) {
    cells.push({ day: d, month: calMonth + 1, year: calYear, other: true });
  }

  const container = document.getElementById('calendar-days');
  container.innerHTML = cells.map(cell => {
    const dateStr = formatDateStr(cell.year, cell.other ? (cell.month < 0 ? 11 : cell.month > 11 ? 0 : cell.month) : cell.month, cell.day);
    const cellDate = new Date(dateStr + 'T00:00:00');
    const isToday = cellDate.getTime() === today.getTime() && !cell.other;
    const dayEvents = cell.other ? [] : events.filter(e => e.date === dateStr);
    const isSelected = selectedDay === dateStr && !cell.other;

    return `<div class="calendar-day ${cell.other ? 'other-month' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${dayEvents.length ? 'has-events' : ''}"
      style="${isSelected ? 'background:#e0f2fe;outline:2px solid var(--cyan);outline-offset:-2px;' : ''}"
      onclick="${!cell.other ? `selectDay('${dateStr}')` : ''}">
      <div class="day-number">${cell.day}</div>
      <div class="day-events">
        ${dayEvents.slice(0,3).map(e => `<div class="day-event-pill event-${e.type}" style="${e.gcalColor ? `background:${e.gcalColor};color:#1e293b;` : ''}" onclick="event.stopPropagation();showEventDetail('${e.id}')">${e.startTime ? escHtml(e.startTime)+' ' : ''}${escHtml(e.title)}</div>`).join('')}
        ${dayEvents.length > 3 ? `<div class="day-event-pill" style="background:var(--gray-200);color:var(--gray-600);">+${dayEvents.length-3} mais</div>` : ''}
      </div>
    </div>`;
  }).join('');
  renderOverdueTeamPanel();
}

function toggleAllUsers() {
  window._eventAssignAll = !window._eventAssignAll;
  const sw = document.getElementById('all-toggle-switch');
  const wrapper = document.getElementById('user-picker-wrapper');
  if (sw) sw.classList.toggle('on', window._eventAssignAll);
  if (wrapper) wrapper.classList.toggle('hidden', window._eventAssignAll);
}

function toggleEventUser(uid) {
  if (!window._eventAssignedUsers) window._eventAssignedUsers = [];
  const idx = window._eventAssignedUsers.indexOf(uid);
  if (idx === -1) window._eventAssignedUsers.push(uid);
  else window._eventAssignedUsers.splice(idx, 1);
  document.querySelectorAll('.multi-user-pick-btn').forEach(b => {
    b.classList.toggle('selected', window._eventAssignedUsers.includes(b.dataset.uid));
  });
}

function saveEvent(eventId, isAdminStr) {
  const isAdmin = isAdminStr === '1';
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { showToast('Informe o título do evento.', 'error'); return; }
  const date = document.getElementById('ev-date').value;
  if (!date) { showToast('Informe a data.', 'error'); return; }
  const desc = document.getElementById('ev-desc').value.trim();
  const type = document.getElementById('ev-type').value;
  const start = document.getElementById('ev-start').value;
  const end = document.getElementById('ev-end').value;

  let assignedTo;
  if (isAdmin && window._eventAssignAll) {
    assignedTo = 'all';
  } else {
    assignedTo = window._eventAssignedUsers && window._eventAssignedUsers.length > 0
      ? window._eventAssignedUsers
      : [currentUser.id];
  }

  const events = getAgenda();
  if (eventId) {
    const ev = events.find(e => e.id === eventId);
    if (ev) {
      ev.title = title;
      ev.description = desc;
      ev.date = date;
      ev.type = type;
      ev.startTime = start;
      ev.endTime = end;
      ev.assignedTo = assignedTo;
    }
    showToast('Evento atualizado!', 'success');
  } else {
    events.push({
      id: genId(),
      title,
      description: desc,
      date,
      startTime: start,
      endTime: end,
      type,
      assignedTo,
      createdBy: currentUser.id,
      createdByName: currentUser.name,
      createdAt: new Date().toISOString()
    });
    showToast('Evento adicionado!', 'success');
  }
  saveAgenda(events);
  closeModal('event-modal-overlay');

  // Navigate to the event's month
  const evDate = new Date(date + 'T00:00:00');
  calYear = evDate.getFullYear();
  calMonth = evDate.getMonth();
  selectedDay = date;
  renderCalendar();
  renderDayDetail(date);
}

function showToast(msg, type = 'info') {

// ============================================================
// UTILS
// ============================================================
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(str) { return escHtml(str); }

function cap(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function formatDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function formatDateBR(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function formatDateStr(year, month, day) {
  const m = ((month % 12) + 12) % 12;
  const y = month < 0 ? year - 1 : month > 11 ? year + 1 : year;
  return `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'agora';
  if (mins < 60) return `${mins}min atrás`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h atrás`;
  const days = Math.floor(hrs / 24);
  return `${days}d atrás`;
}

async function diagCards() {
  if (!window.__db) { alert('Firebase não conectado'); return; }
  const snap = await window.__getDocs(window.__col('ou_cards')).catch(() => null);
  if (!snap) { alert('Erro ao ler Firestore'); return; }
  let report = '';
  snap.forEach(d => {
    let cards = [];
    try { cards = JSON.parse(d.data().cards || '[]'); } catch {}
    report += `${d.id}: ${cards.length} cards\n`;
    // Restaura no cache imediatamente
    window._cache.cards[d.id] = cards;
  });
  alert('Dados no Firestore:\n' + report);
  renderKanban();
  renderOverdueTeamPanel();
}

<script>
// ============================================================
// GOOGLE CALENDAR INTEGRATION
// ============================================================
const GCAL_CLIENT_ID = '878566113583-q4t0n31s4hm4bf6hkv8jos95mtu5d6kt.apps.googleusercontent.com';
const GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

let _gcalTokenClient = null;
let _gcalAccessToken = null;

function initGoogleCalendar() {
  if (!window.google?.accounts?.oauth2) return;
  _gcalTokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPES,
    callback: (response) => {
      if (response.error) { showToast('Erro ao conectar Google Agenda', 'error'); return; }
      _gcalAccessToken = response.access_token;
      // Salva token no cache do usuário
      if (!window._cache.gcalTokens) window._cache.gcalTokens = {};
      window._cache.gcalTokens[currentUser.id] = response.access_token;
      localStorage.setItem('ou_gcal_' + currentUser.id, response.access_token);
      showToast('Google Agenda conectada!', 'success');
      updateGcalBtn();
      fetchGoogleCalendarEvents();
    }
  });
}

function connectGoogleCalendar() {
  if (!_gcalTokenClient) {
    showToast('Google ainda carregando, tente novamente em segundos', 'info');
    setTimeout(initGoogleCalendar, 1000);
    return;
  }
  _gcalTokenClient.requestAccessToken();
}

function disconnectGoogleCalendar() {
  _gcalAccessToken = null;
  localStorage.removeItem('ou_gcal_' + currentUser.id);
  if (window._cache.gcalTokens) delete window._cache.gcalTokens[currentUser.id];
  // Remove eventos do Google da agenda
  const agenda = getAgenda().filter(e => e.source !== 'google');
  saveAgenda(agenda);
  showToast('Google Agenda desconectada', 'info');
  updateGcalBtn();
  renderCalendar();
}

function updateGcalBtn() {
  const btn = document.getElementById('gcal-connect-btn');
  if (!btn) return;
  const token = _gcalAccessToken || localStorage.getItem('ou_gcal_' + currentUser?.id);
  if (token) {
    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:16px;height:16px;"> Agenda Conectada ✓';
    btn.style.background = '#e8f5e9';
    btn.style.borderColor = '#4caf50';
    btn.style.color = '#2e7d32';
    btn.onclick = disconnectGoogleCalendar;
  } else {
    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:16px;height:16px;"> Google Agenda';
    btn.style.background = '#fff';
    btn.style.borderColor = '#4285f4';
    btn.style.color = '#4285f4';
    btn.onclick = connectGoogleCalendar;
  }
}

async function fetchGoogleCalendarEvents() {
  const token = _gcalAccessToken || localStorage.getItem('ou_gcal_' + currentUser?.id);
  if (!token || !currentUser) return;

  try {
    const now = new Date();
    const threeMonths = new Date(now);
    threeMonths.setMonth(threeMonths.getMonth() + 3);
    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${threeMonths.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=50`;

    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) {
      if (res.status === 401) {
        // Token expirado
        localStorage.removeItem('ou_gcal_' + currentUser.id);
        _gcalAccessToken = null;
        updateGcalBtn();
      }
      return;
    }
    const data = await res.json();
    const gcalEvents = (data.items || []).map(item => {
      const date = (item.start?.dateTime || item.start?.date || '').substring(0, 10);
      let startTime = '', endTime = '';
      if (item.start?.dateTime) {
        const fmt = t => new Date(t).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        startTime = fmt(item.start.dateTime);
        if (item.end?.dateTime) endTime = fmt(item.end.dateTime);
      }
      // Cores do Google Calendar (colorId → hex)
      const GCAL_COLORS = {
        '1':'#a4bdfc','2':'#7ae7bf','3':'#dbadff','4':'#ff887c',
        '5':'#fbd75b','6':'#ffb878','7':'#46d6db','8':'#e1e1e1',
        '9':'#5484ed','10':'#51b749','11':'#dc2127'
      };
      const gcalColor = item.colorId ? GCAL_COLORS[item.colorId] : null;

      return {
        id: 'gcal_' + item.id,
        title: item.summary || '(sem título)',
        date,
        startTime,
        endTime,
        type: 'compromisso',
        assignedTo: [currentUser.id],
        createdBy: currentUser.id,
        createdByName: currentUser.name,
        source: 'google',
        gcalColor,
        gcalLink: item.htmlLink,
        location: item.location || '',
        description: item.description || ''
      };
    }).filter(e => e.date);

    // Remove eventos antigos do Google e adiciona os novos
    const existingAgenda = getAgenda().filter(e => e.source !== 'google' || e.createdBy !== currentUser.id);
    saveAgenda([...existingAgenda, ...gcalEvents]);
    renderCalendar();
    showToast(`${gcalEvents.length} eventos importados do Google Agenda`, 'success');
  } catch(e) {
    console.warn('Erro ao buscar Google Calendar:', e);
  }
}

// Inicializa GIS quando disponível e mostra botão ao mudar de aba
window.addEventListener('load', () => {
  const waitGIS = setInterval(() => {
    if (window.google?.accounts?.oauth2) {
      initGoogleCalendar();
      clearInterval(waitGIS);
    }
  }, 500);
});

// Chamado ao trocar para aba de agenda
const _origSwitchTab = typeof switchTab === 'function' ? switchTab : null;
</script>

}

function loadColTitles() {
  const key = 'ou_col_titles_' + currentUser.id;

function getDefaultColTitle(col) {
  return { todo: 'A Fazer', delegated: 'Delegado', progress: 'Em Progresso', done: 'Concluído' }[col] || col;
}

function getCardOrder(col) {
  try { return JSON.parse(localStorage.getItem('cardOrder_' + currentUser.id + '_' + col) || 'null'); } catch { return null; }
}
function saveCardOrder(col, ids) {
  localStorage.setItem('cardOrder_' + currentUser.id + '_' + col, JSON.stringify(ids));
}

const PRIO_ORDER = { alta: 0, media: 1, baixa: 2 };

function autoSortCards(colCards) {
  return [...colCards].sort((a, b) => {
    // 1º prioridade
    const pa = PRIO_ORDER[a.priority] ?? 1;
    const pb = PRIO_ORDER[b.priority] ?? 1;
    if (pa !== pb) return pa - pb;
    // 2º prazo mais próximo (sem prazo vai pro final)
    const da = a.dueDate ? new Date(a.dueDate + 'T' + (a.dueTime || '23:59') + ':00').getTime() : Infinity;
    const db = b.dueDate ? new Date(b.dueDate + 'T' + (b.dueTime || '23:59') + ':00').getTime() : Infinity;
    return da - db;
  });
}

function sortedColCards(cards, col) {
  const colCards = cards.filter(c => c.column === col);
  const order = getCardOrder(col);
  if (order) {
    // Respeita ordem manual salva, mas dentro de cada bloco de prioridade mantém a ordem manual
    // Novos cards (não na order) ficam no topo do seu bloco de prioridade
    const orderMap = {};
    order.forEach((id, i) => { orderMap[id] = i; });
    colCards.sort((a, b) => {
      const pa = PRIO_ORDER[a.priority] ?? 1;
      const pb = PRIO_ORDER[b.priority] ?? 1;
      if (pa !== pb) return pa - pb;
      // Mesma prioridade: respeita ordem manual
      const ai = orderMap[a.id] !== undefined ? orderMap[a.id] : -1;
      const bi = orderMap[b.id] !== undefined ? orderMap[b.id] : -1;
      if (ai === -1 && bi === -1) return 0;
      if (ai === -1) return -1;
      if (bi === -1) return 1;
      return ai - bi;
    });
    return colCards;
  }
  // Sem ordem manual: ordena automaticamente
  return autoSortCards(colCards);
}

function renderKanban() {
  let cards = getCards(currentUser.id);
  // Migração: cards em 'waiting' vão para 'delegated'
  let migrated = false;
  cards.forEach(c => {
    if (c.column === 'waiting') { c.column = 'delegated'; migrated = true; }
    // Cards do dono com delegatedTo[] que ainda não estão em delegated
    if (c.delegatedTo?.length && !c.isDelegation && c.column !== 'done' && c.column !== 'delegated') { c.column = 'delegated'; migrated = true; }
  });
  // Remove cards compartilhados (sharedOriginId) que não têm chat com mensagens
  const chats = window._cache?.chats || {};
  const antes = cards.length;
  cards = cards.filter(c => {
    if (!c.sharedOriginId) return true; // não é cópia compartilhada, mantém
    const chatId = c.sharedChatId || c.id;
    const temChat = (chats[chatId]?.length || 0) > 0;
    return temChat; // mantém só se tem chat
  });
  if (cards.length !== antes) { migrated = true; }
  if (migrated) saveCards(currentUser.id, cards);
  const cols = ['todo','delegated','progress','done'];
  cols.forEach(col => {
    const colCards = sortedColCards(cards, col);
    document.getElementById('count-' + col).textContent = colCards.length;
    const container = document.getElementById('cards-' + col);
    if (colCards.length === 0) {
      container.innerHTML = `<div class="empty-col">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="12" x2="12" y2="12"/>
        </svg>
        <span>Nenhuma tarefa</span>
      </div>`;
    } else {
      container.innerHTML = colCards.map(c => renderCard(c)).join('');
      colCards.forEach(c => {
        const el = document.getElementById('card-' + c.id);
        if (el) {
          el.addEventListener('dragstart', e => onDragStart(e, c.id, col));
          el.addEventListener('dragend', onDragEnd);
          // Reordenação dentro da coluna
          el.addEventListener('dragover', e => onCardDragOver(e, c.id, col));
        }
      });
    }
  });
}

function renderCard(card) {
  const today = new Date(); today.setHours(0,0,0,0);
  let dateHtml = '';
  let isOverdue = false;
  if (card.dueDate) {
    const due = card.dueTime
      ? new Date(card.dueDate + 'T' + card.dueTime + ':00')
      : new Date(card.dueDate + 'T23:59:59');
    isOverdue = due < new Date() && card.column !== 'done';
    dateHtml = `<span class="card-date ${isOverdue ? 'overdue' : ''}">📅 ${formatDate(card.dueDate)}${card.dueTime ? ' ' + card.dueTime : ''}${isOverdue ? ' · FORA DO PRAZO' : ''}</span>`;
  }
  let delegHtml = '';
  const isPending = card.isDelegation && card.delegationStatus === 'pending';
  const isAcceptedDelegation = (card.isDelegation && card.delegationStatus === 'accepted' && card.column !== 'done')
    || (card.delegatedFrom && card.delegationStatus !== 'pending' && card.column !== 'done');
  const isDoneDelegation = card.delegationDone && card.column !== 'done'; // verde no card do dono
  if (isPending) {
    // Encontra o delegationId para poder aceitar/recusar direto do card
    const delegId = card.delegationId || '';
    delegHtml = `
      <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
        <span style="font-size:0.72rem;color:var(--gray-400);">De: <strong>${escHtml(card.delegatedFromName)}</strong></span>
        <button class="btn-accept-inline" onclick="acceptFromCard('${delegId}','${card.id}')" title="Aceitar tarefa">✓ Aceitar</button>
        <button class="card-action-btn btn-delete-card" style="opacity:1;width:22px;height:22px;font-size:0.7rem;" onclick="refuseFromCard('${delegId}','${card.id}')" title="Recusar">✕</button>
      </div>`;
  } else if (card.isDelegation && card.delegationStatus === 'accepted') {
    delegHtml = `<span class="delegation-badge from">👤 De: ${card.delegatedFromName}</span>`;
  }

  // Mostra para quem foi delegado (no card do dono) e por quem (no card do destinatário)
  let delegatedToHtml = '';
  if (card.delegatedTo?.length) {
    const mainId = card.delegatedMainId || card.delegatedTo[0];
    const mainUser = getUserById(mainId);
    const mainName = mainUser ? mainUser.name : mainId;
    const copias = card.delegatedTo.filter(uid => uid !== mainId).map(uid => { const u = getUserById(uid); return u ? u.name : uid; });
    delegatedToHtml = `<div style="font-size:0.72rem;background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:3px 8px;margin-top:5px;color:#1e40af;">👤 <strong>Responsável: ${escHtml(mainName)}</strong>${copias.length ? ` · Cópia: ${escHtml(copias.join(', '))}` : ''}</div>`;
  }
  let delegatedByHtml = '';
  if (card.isDelegation && card.delegatedFromName) {
    delegatedByHtml = `<div style="font-size:0.72rem;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:5px;padding:3px 8px;margin-top:5px;color:#5b21b6;">↩️ <strong>Delegado por: ${escHtml(card.delegatedFromName)}</strong></div>`;
  }

  // Label de status do card
  const colLabel = (() => {
    if (card.column === 'done') return { text: 'Concluído', color: '#16a34a', bg: '#dcfce7' };
    if (card.column === 'progress') return { text: 'Em Processo', color: '#d97706', bg: '#fef3c7' };
    if (card.column === 'delegated' || card.isDelegation) return { text: 'Delegado', color: '#C47B2B', bg: '#fef9f0' };
    return { text: 'A Fazer', color: '#6366f1', bg: '#eef2ff' };
  })();

  return `
    <div class="kanban-card${isPending ? ' pending-delegation' : ''}${isOverdue && !isPending ? ' overdue-card' : ''}${isDoneDelegation ? ' done-delegation-card' : ''}" id="card-${card.id}" draggable="${!isPending}" onclick="openCardView('${card.id}',event)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <span style="font-size:0.68rem;font-weight:700;color:${colLabel.color};background:${colLabel.bg};padding:2px 8px;border-radius:10px;letter-spacing:0.03em;">${colLabel.text}</span>
        <span class="priority-badge priority-${card.priority}">${cap(card.priority)}</span>
      </div>
      <div class="card-top">
        <div class="card-title">${escHtml(card.title)}</div>
      </div>
      ${card.description ? `<div class="card-desc">${escHtml(card.description)}</div>` : ''}
      ${(() => {
        // Mostra chat herdado de compartilhamento apenas se já existem mensagens
        if (!card.sharedChatId && !card.sharedOriginId) return '';
        const chatId = card.sharedChatId || card.id;
        const msgs = (window._cache?.chats?.[chatId] || []);
        const unreadCount = (window._cache?.chatUnread?.[chatId]?.[currentUser.id]) || 0;
        if (msgs.length === 0 && unreadCount === 0) return ''; // sem chat, some
        return `<div style="margin-bottom:4px;"><button onclick="openSharedChat('${card.id}')" class="${unreadCount ? 'chat-btn-unread' : ''}" style="font-size:0.7rem;background:${unreadCount ? '#ef4444' : '#0ea5e9'};color:#fff;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;">💬 Chat${unreadCount ? ' (' + unreadCount + ')' : ''}</button></div>`;
      })()}
      ${delegatedToHtml}
      ${delegatedByHtml}
      ${(() => {
        // Verifica se existe chat de cobrança para este card
        const chats = window._cache.chats || {};
        const cobrarChats = Object.keys(chats).filter(cid => cid.startsWith('cobrar__') && cid.endsWith('__' + card.id));
        if (cobrarChats.length === 0) return '';
        return cobrarChats.map(cobrarChatId => {
          const unread = (window._cache?.chatUnread?.[cobrarChatId]?.[currentUser.id]) || 0;
          const msgs = chats[cobrarChatId] || [];
          if (msgs.length === 0) return '';
          // Pega quem enviou a primeira mensagem (o cobrador real)
          const firstMsg = msgs[0];
          const cobradorId = firstMsg?.userId || firstMsg?.senderId || cobrarChatId.split('__')[1];
          const cobradorUser = getUserById(cobradorId);
          const cobradorName = cobradorUser ? cobradorUser.name : cobradorId;
          return `<button onclick="openCobrarChatFromNotif('${cobrarChatId}')" style="width:100%;text-align:left;margin-top:5px;padding:5px 9px;border-radius:6px;border:1.5px solid ${unread ? '#ef4444' : '#0ea5e9'};background:${unread ? '#fef2f2' : '#f0f9ff'};color:${unread ? '#b91c1c' : '#0369a1'};font-size:0.75rem;font-weight:600;cursor:pointer;">
            💬 ${unread ? `(${unread} nova${unread>1?'s':''}) ` : ''}Cobrança de ${escHtml(cobradorName)}
          </button>`;
        }).join('');
      })()}
      ${isDoneDelegation ? `<div style="font-size:0.75rem;color:#16a34a;font-weight:700;margin-bottom:4px;">✅ Concluído por quem recebeu</div>` : ''}
      <div class="card-footer">
        <div class="card-meta">
          ${dateHtml}
        </div>
        <div class="card-actions">
          <button class="card-action-btn btn-edit-card" onclick="openEditCard('${card.id}')" title="Editar">✏️</button>
          ${card.delegationStatus !== 'pending' ? `<button class="card-action-btn btn-delegate-card" onclick="openDelegate('${card.id}')" title="Delegar">📤</button>` : ''}
          <button class="card-action-btn" onclick="openSharedChat('${card.id}')" title="Chat" style="font-size:1rem;font-weight:700;color:#0ea5e9;">+</button>
          <button class="card-action-btn btn-delete-card" onclick="deleteCard('${card.id}')" title="Excluir">🗑️</button>
        </div>
      </div>
      ${isPending ? delegHtml : ''}
      ${isAcceptedDelegation ? `<button class="btn-finalizar-delegacao" onclick="finalizarDelegacao('${card.id}')">✅ Marcar como Finalizado</button>` : ''}
    </div>
  `;
}

        </div>
      </div>
    </div>`;
  renderModal(html);
}

function toggleShareUser(uid) {
  if (_shareSelectedUsers.has(uid)) _shareSelectedUsers.delete(uid);
  else _shareSelectedUsers.add(uid);
  document.querySelectorAll('#share-user-picker .user-pick-btn').forEach(b => {
    b.classList.toggle('selected', _shareSelectedUsers.has(b.dataset.uid));
  });
}

function saveShare(cardId) {
  const sharedWith = [..._shareSelectedUsers];
  // Atualiza card do criador
  const myCards = getCards(currentUser.id);
  const card = myCards.find(c => c.id === cardId);
  if (!card) return;
  card.sharedWith = sharedWith;
  card.sharedChatId = card.sharedChatId || genId();
  saveCards(currentUser.id, myCards);

  // Cria/atualiza cópia do card nos perfis dos colaboradores
  sharedWith.forEach(uid => {
    const theirCards = getCards(uid);
    const existing = theirCards.find(c => c.sharedOriginId === cardId);
    if (!existing) {
      theirCards.push({
        id: genId(),
        title: card.title,
        description: card.description,
        priority: card.priority,
        dueDate: card.dueDate,
        column: 'todo',
        createdAt: new Date().toISOString(),
        isShared: true,
        sharedOriginId: cardId,
        sharedOriginUser: currentUser.id,
        sharedOriginName: currentUser.name,
        sharedChatId: card.sharedChatId,
        sharedWith
      });
      saveCards(uid, theirCards);
      // Notifica
      const notifs = getNotifications(uid);
      notifs.push({ id: genId(), type: 'shared_card', message: `🤝 ${currentUser.name} compartilhou "${card.title}" com você`, read: false, createdAt: new Date().toISOString() });
      saveNotifications(uid, notifs);
    }
  });
  _shareSelectedUsers = new Set();
  closeModal('share-modal-overlay');
  showToast(`Compartilhado com ${sharedWith.length} pessoa(s)`, 'success');
  renderKanban();
}

async function openSharedChat(cardId) {
  // Busca o card (pode estar em qualquer usuário)
  let card = getCards(currentUser.id).find(c => c.id === cardId);
  if (!card) {
    card = getCards(currentUser.id).find(c => c.sharedOriginId === cardId);
  }
  if (!card) return;
  const chatId = card.sharedChatId || card.id;
  console.log('[Chat] openSharedChat | cardId:', cardId, '| chatId:', chatId, '| card.sharedChatId:', card.sharedChatId, '| card.sharedWith:', card.sharedWith, '| card.sharedOriginUser:', card.sharedOriginUser);
  const chats = window._cache.chats || {};
  const messages = chats[chatId] || [];

  // Marca como lido para o usuário atual
  if (!window._cache.chatUnread) window._cache.chatUnread = {};
  const unread = { ...(window._cache.chatUnread[chatId] || {}) };
  if (unread[currentUser.id]) {
    delete unread[currentUser.id];
    window._cache.chatUnread[chatId] = unread;
    if (window.__setDoc) {
      window.__setDoc(window.__doc('ou_chats', chatId), {
        messages: JSON.stringify(messages),
        unread: JSON.stringify(unread)
      }).catch(() => null);
    }
    renderKanban();
  }

  const html = `
    <div class="modal-overlay" id="chat-modal-overlay" onclick="closeOnOverlay(event,'chat-modal-overlay')">
      <div class="modal" role="dialog" style="max-width:480px;">
        <div class="modal-header">
          <span class="modal-title">💬 ${escHtml(card.title)}</span>
          <button class="modal-close" onclick="closeModal('chat-modal-overlay')">✕</button>
        </div>
        <div class="modal-body">
          <div id="chat-messages" style="max-height:320px;overflow-y:auto;margin-bottom:4px;">
            ${messages.length === 0 ? `<div style="text-align:center;color:var(--gray-400);padding:24px;font-size:0.85rem;">Nenhuma mensagem ainda. Seja o primeiro!</div>` :
              messages.map(m => `
                <div class="chat-bubble${m.userId === currentUser.id ? ' mine' : ''}">
                  <div class="chat-author">${escHtml(m.userName)} · ${timeAgo(m.createdAt)}</div>
                  <div>${escHtml(m.text)}</div>
                </div>`).join('')}
          </div>
          <div class="chat-input-row">
            <input type="text" id="chat-msg-input" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter')sendChatMsg('${chatId}','${cardId}')"/>
            <button class="chat-send-btn" onclick="sendChatMsg('${chatId}','${cardId}')">Enviar</button>
          </div>
        </div>
      </div>
    </div>`;
  renderModal(html);
  setTimeout(() => {
    const el = document.getElementById('chat-messages');
    if (el) el.scrollTop = el.scrollHeight;
    document.getElementById('chat-msg-input')?.focus();
  }, 100);
}

async function sendChatMsg(chatId, cardId) {
  try {
  console.log('[Chat] sendChatMsg chamado', chatId, cardId);
  const input = document.getElementById('chat-msg-input');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';

  if (!window._cache.chats) window._cache.chats = {};
  if (!window._cache.chats[chatId]) window._cache.chats[chatId] = [];
  const msg = { id: genId(), userId: currentUser.id, userName: currentUser.name, text, createdAt: new Date().toISOString() };
  window._cache.chats[chatId].push(msg);

  if (!window._cache.chatUnread) window._cache.chatUnread = {};
  const unread = { ...(window._cache.chatUnread[chatId] || {}) };

  // Monta participantes varrendo cache de todos os usuários
  const allCards = window._cache.cards || {};
  const participantSet = new Set();
  for (const [uid, cardArr] of Object.entries(allCards)) {
    if (!Array.isArray(cardArr)) continue;
    for (const c of cardArr) {
      const matchesChat = c.sharedChatId === chatId || c.id === chatId;
      if (!matchesChat) continue;
      participantSet.add(uid);
      if (c.sharedOriginUser) participantSet.add(c.sharedOriginUser);
      const sw = Array.isArray(c.sharedWith) ? c.sharedWith : (c.sharedWith ? String(c.sharedWith).split(',').map(s=>s.trim()).filter(Boolean) : []);
      sw.forEach(id => participantSet.add(id));
      // Inclui delegador e delegados como participantes do chat
      if (c.delegatedFrom) participantSet.add(c.delegatedFrom);
      if (Array.isArray(c.delegatedTo)) c.delegatedTo.forEach(id => participantSet.add(id));
    }
  }
  // Garante que o dono original (sharedOriginUser) sempre recebe notificação
  // mesmo que o cache local não tenha os cards dele
  const myCard = getCards(currentUser.id).find(c => c.sharedChatId === chatId || c.id === chatId);
  if (myCard?.sharedOriginUser) participantSet.add(myCard.sharedOriginUser);
  // Se eu sou o dono (tenho sharedWith), todos os sharedWith são participantes
  if (myCard?.sharedWith) {
    const sw2 = Array.isArray(myCard.sharedWith) ? myCard.sharedWith : String(myCard.sharedWith).split(',').map(s=>s.trim()).filter(Boolean);
    sw2.forEach(id => participantSet.add(id));
  }
  participantSet.add(currentUser.id);
  console.log('[Chat] chatId:', chatId, '| participantes:', [...participantSet]);
  console.log('[Chat] cache keys:', Object.keys(allCards));

  participantSet.forEach(uid => {
    if (uid !== currentUser.id) unread[uid] = (unread[uid] || 0) + 1;
  });
  window._cache.chatUnread[chatId] = unread;
  console.log('[Chat] unread após envio:', JSON.stringify(unread));

  // Salva no Firestore
  if (window.__setDoc) {
    await window.__setDoc(window.__doc('ou_chats', chatId), {
      messages: JSON.stringify(window._cache.chats[chatId]),
      unread: JSON.stringify(unread)
    });
  }

  // Re-renderiza o chat
  openSharedChat(cardId);
  } catch(err) { console.error('[Chat] ERRO em sendChatMsg:', err); }
}

// Aceitar delegação direto do card no kanban
function acceptFromCard(delegId, cardId) {
  if (delegId) {
    // Usa o fluxo padrão de resposta (notifica remetente, etc.)
    const delegations = getDelegations();
    const deleg = delegations.find(d => d.id === delegId);
    if (deleg) { respondDelegation(delegId, 'accepted'); return; }
  }
  // Fallback: aceita só localmente (sem delegationId)
  const cards = getCards(currentUser.id);
  const card = cards.find(c => c.id === cardId);
  if (card) {
    card.delegationStatus = 'accepted';
    // mantém isDelegation=true para syncDoneToOrigin funcionar ao concluir
    saveCards(currentUser.id, cards);
    renderVello();
    showToast('Tarefa aceita!', 'success');
  }
}

// Recusar delegação direto do card no kanban
function refuseFromCard(delegId, cardId) {
  if (!confirm('Recusar esta tarefa?')) return;
  if (delegId) {
    const delegations = getDelegations();
    const deleg = delegations.find(d => d.id === delegId);
    if (deleg) { respondDelegation(delegId, 'refused'); return; }
  }
  // Fallback: remove só localmente
  const cards = getCards(currentUser.id).filter(c => c.id !== cardId);
  saveCards(currentUser.id, cards);
  renderVello();
  showToast('Tarefa recusada.', 'info');
}

// ============================================================
// DRAG AND DROP
// ============================================================
let dragOverCardId = null;
let dragOverPos = null; // 'before' | 'after'

function onCardDragOver(e, targetCardId, col) {
  if (dragFromCol !== col) return; // só reordena na mesma coluna
  if (dragCardId === targetCardId) return;
  e.preventDefault();
  e.stopPropagation();
  const el = document.getElementById('card-' + targetCardId);
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  const pos = e.clientY < mid ? 'before' : 'after';
  // Remove indicadores anteriores
  document.querySelectorAll('.drop-indicator').forEach(d => d.remove());
  dragOverCardId = targetCardId;
  dragOverPos = pos;
  // Mostra linha indicadora
  const indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  indicator.style.cssText = 'height:3px;background:#7c3aed;border-radius:2px;margin:2px 0;pointer-events:none;';
  if (pos === 'before') el.parentNode.insertBefore(indicator, el);
  else el.parentNode.insertBefore(indicator, el.nextSibling);
}

function onDragStart(e, cardId, fromCol) {
  dragCardId = cardId;
  dragFromCol = fromCol;
  dragOverCardId = null;
  dragOverPos = null;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.getElementById('card-' + cardId);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onDragEnd(e) {
  const el = document.getElementById('card-' + dragCardId);
  if (el) el.classList.remove('dragging');
  document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
  document.querySelectorAll('.drop-indicator').forEach(d => d.remove());
}

function onDragOver(e, col) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById('col-' + col).classList.add('drag-over');
}

function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function onDrop(e, toCol) {
  e.preventDefault();
  document.getElementById('col-' + toCol).classList.remove('drag-over');
  document.querySelectorAll('.drop-indicator').forEach(d => d.remove());
  if (!dragCardId) return;

  const cards = getCards(currentUser.id);
  const card = cards.find(c => c.id === dragCardId);
  if (!card) return;

  if (dragFromCol === toCol) {
    // Reordenação dentro da mesma coluna
    if (dragOverCardId && dragOverCardId !== dragCardId) {
      const colCards = sortedColCards(cards, toCol);
      const ids = colCards.map(c => c.id);
      const fromIdx = ids.indexOf(dragCardId);
      if (fromIdx !== -1) ids.splice(fromIdx, 1);
      let toIdx = ids.indexOf(dragOverCardId);
      if (toIdx === -1) toIdx = ids.length;
      else if (dragOverPos === 'after') toIdx++;
      ids.splice(toIdx, 0, dragCardId);
      saveCardOrder(toCol, ids);
      renderKanban();
    }
  } else {
    // Mover entre colunas
    if (card.delegationStatus === 'pending' && toCol !== 'todo') {
      showToast('Aceite a delegação antes de mover.', 'error');
      return;
    }
    card.column = toCol;
    saveCards(currentUser.id, cards);
    if (toCol === 'done') syncDoneToOrigin(card);
    renderKanban();
  }

  dragCardId = null;
  dragFromCol = null;
  dragOverCardId = null;
  dragOverPos = null;
}

function finalizarDelegacao(cardId) {
  const cards = getCards(currentUser.id);
  const card = cards.find(c => c.id === cardId);
  if (!card) return;
  card.column = 'done';
  saveCards(currentUser.id, cards);
  syncDoneToOrigin(card);
  renderKanban();
  showToast('Atividade finalizada!', 'success');
}

function syncDoneToOrigin(card) {
  // Usa leitura direta do Firestore para garantir dados frescos
  _syncDoneToOriginAsync(card).catch(e => console.error('syncDoneToOrigin error:', e));
}

async function _syncDoneToOriginAsync(card) {
  const getDoc = window.__getDoc;

  // --- Delegação: marca original como concluído e notifica dono ---
  if (card.delegatedFrom) {
    const originUserId = card.delegatedFrom;

    // Lê direto do Firestore para ter os dados mais recentes
    const snap = await getDoc(window.__doc('ou_cards', originUserId));
    const originCards = snap.exists() ? JSON.parse(snap.data().cards || '[]') : [];

    // Busca delegações direto do Firestore para evitar race condition com cache desatualizado
    let originCardId = null;
    try {
      const delSnap = await getDoc(window.__doc('ou_shared', 'delegations'));
      const freshDelegations = delSnap.exists() ? JSON.parse(delSnap.data().data || '[]') : [];
      const delegation = freshDelegations.find(d => d.id === card.delegationId);
      originCardId = delegation?.cardId || null;
      if (freshDelegations.length) window._cache.delegations = freshDelegations;
    } catch (e) {
      const delegation = getDelegations().find(d => d.id === card.delegationId);
      originCardId = delegation?.cardId || null;
    }

    const originCard = originCards.find(c =>
      (originCardId && c.id === originCardId) ||
      (c.delegationIdMap && c.delegationIdMap[currentUser.id] === card.delegationId) ||
      (c.delegatedTo?.includes(currentUser.id) && c.title === card.title) ||
      c.title === card.title
    );

    if (originCard && originCard.column !== 'done') {
      originCard.delegationDone = true;
      originCard.column = 'done';
      window._cache.cards[originUserId] = originCards;
      await saveCards(originUserId, originCards);
    }
    // Notifica o dono
    const notifs = getNotifications(originUserId);
    notifs.push({
      id: genId(),
      type: 'task_done',
      message: `✅ ${currentUser.name} concluiu "${card.title}"`,
      read: false,
      createdAt: new Date().toISOString()
    });
    saveNotifications(originUserId, notifs);
  }

  // --- Compartilhado: marca card original como verde (delegationDone) e notifica ---
  if (card.sharedChatId || card.sharedOriginId || card.sharedWith?.length) {
    const chatId = card.sharedChatId;
    const originId = card.sharedOriginId || card.id;
    const allUsers = Object.keys(window._cache.cards || {});

    for (const uid of allUsers) {
      if (uid === currentUser.id) continue; // quem concluiu já foi tratado
      // Lê direto do Firestore para dados frescos
      const snap = await getDoc(window.__doc('ou_cards', uid));
      const cardArr = snap.exists() ? JSON.parse(snap.data().cards || '[]') : [];
      let changed = false;
      cardArr.forEach(c => {
        const isRelated =
          c.id === originId ||
          c.sharedOriginId === originId ||
          (chatId && c.sharedChatId === chatId);
        if (isRelated && c.column !== 'done') {
          c.delegationDone = true;
          c.column = 'done';
          changed = true;
        }
        if (isRelated && c.column === 'done') {
          // Já estava done, nada a fazer
        }
      });
      if (changed) {
        window._cache.cards[uid] = cardArr;
        await saveCards(uid, cardArr);
        // Notifica cada participante (exceto quem concluiu)
        if (uid !== currentUser.id) {
          const notifs = getNotifications(uid);
          notifs.push({
            id: genId(),
            type: 'task_done',
            message: `✅ ${currentUser.name} concluiu "${card.title}"`,
            read: false,
            createdAt: new Date().toISOString()
          });
          saveNotifications(uid, notifs);
        }
      }
    }
  }
}

function saveCard(cardId, defaultCol) {
  const title = document.getElementById('card-title').value.trim();
  if (!title) { showToast('Informe o título da tarefa.', 'error'); return; }
  const desc = document.getElementById('card-desc').value.trim();
  const priority = document.getElementById('card-priority').value;
  const due = document.getElementById('card-due').value;
  const dueTime = document.getElementById('card-due-time')?.value || '';
  const colEl = document.getElementById('card-col');
  const col = colEl ? colEl.value : defaultCol;

  const cards = getCards(currentUser.id);
  if (cardId) {
    const card = cards.find(c => c.id === cardId);
    if (card) {
      card.title = title;
      card.description = desc;
      card.priority = priority;
      card.dueDate = due;
      card.dueTime = dueTime;
      card.column = col;
      if (col === 'done') syncDoneToOrigin(card);
    }
    showToast('Tarefa atualizada!', 'success');
  } else {
    const newId = genId();
    cards.push({
      id: newId,
      title,
      description: desc,
      priority,
      dueDate: due,
      dueTime,
      column: col,
      createdAt: new Date().toISOString(),
      delegatedFrom: null,
      delegatedFromName: null,
      isDelegation: false,
      delegationStatus: null
    });
    // Coloca novo card no topo da ordem
    const order = getCardOrder(col) || cards.filter(c => c.column === col).map(c => c.id).filter(id => id !== newId);
    order.unshift(newId);
    saveCardOrder(col, order);

    // Se selecionou delegados, delega imediatamente
    if (_newCardDelegateIds.length > 0) {
      saveCards(currentUser.id, cards);
      closeModal('card-modal-overlay');
      _autoDelegate(newId, [..._newCardDelegateIds]);
      _newCardDelegateIds = [];
      return;
    }
    showToast('Tarefa adicionada!', 'success');
  }
  saveCards(currentUser.id, cards);
  closeModal('card-modal-overlay');
  renderKanban();
}

function _autoDelegate(cardId, delegateIds) {
  const cards = getCards(currentUser.id);
  const card = cards.find(c => c.id === cardId);
  if (!card) return;
  const delegations = getDelegations();
  const newDelegationMap = {};
  delegateIds.forEach(toUserId => {
    const delegation = { id: genId(), fromUserId: currentUser.id, fromUserName: currentUser.name, toUserId, cardId, cardTitle: card.title, cardDescription: card.description, cardPriority: card.priority, cardDueDate: card.dueDate, message: '', status: 'pending', createdAt: new Date().toISOString() };
    delegations.push(delegation);
    newDelegationMap[toUserId] = delegation.id;
    const recipientCards = getCards(toUserId);
    recipientCards.push({ id: genId(), title: card.title, description: card.description, priority: card.priority, dueDate: card.dueDate, column: 'todo', createdAt: new Date().toISOString(), delegatedFrom: currentUser.id, delegatedFromName: currentUser.name, isDelegation: true, delegationStatus: 'accepted', delegationId: delegation.id });
    saveCards(toUserId, recipientCards);
    const notifs = getNotifications(toUserId);
    notifs.push({ id: genId(), type: 'incoming_delegation', delegationId: delegation.id, fromName: currentUser.name, cardTitle: card.title, message: '', read: false, createdAt: new Date().toISOString() });
    saveNotifications(toUserId, notifs);
  });
  card.delegatedTo = [...delegateIds];
  card.delegationIdMap = newDelegationMap;
  card.delegatedMainId = delegateIds[0];
  card.column = 'delegated';
  saveCards(currentUser.id, cards);
  saveDelegations(delegations);
  const mainName = getUserById(delegateIds[0])?.name || delegateIds[0];
  showToast('Tarefa criada e delegada para ' + mainName + '!', 'success');
  renderVello();
}

let selectedDelegateUserIds = new Set();
let delegateOrderedIds = []; // mantém ordem de seleção

function selectDelegateUser(uid) {
  if (selectedDelegateUserIds.has(uid)) {
    selectedDelegateUserIds.delete(uid);
    delegateOrderedIds = delegateOrderedIds.filter(id => id !== uid);
  } else {
    selectedDelegateUserIds.add(uid);
    delegateOrderedIds.push(uid);
  }
  // Atualiza visual dos botões com badges de ordem
  delegateOrderedIds.forEach((id, i) => {
    const badge = document.getElementById('deleg-badge-' + id);
    if (badge) {
      badge.style.display = '';
      badge.textContent = i === 0 ? '★' : (i + 1) + 'º';
      badge.style.background = i === 0 ? '#6366f1' : '#9ca3af';
    }
  });
  document.querySelectorAll('#delegate-user-picker .user-pick-btn').forEach(b => {
    const selected = selectedDelegateUserIds.has(b.dataset.uid);
    b.classList.toggle('selected', selected);
    const badge = document.getElementById('deleg-badge-' + b.dataset.uid);
    if (badge && !selected) { badge.style.display = 'none'; badge.textContent = ''; }
  });
  // Preview
  const preview = document.getElementById('deleg-preview');
  if (preview && delegateOrderedIds.length > 0) {
    const principal = getUserById(delegateOrderedIds[0]);
    const copias = delegateOrderedIds.slice(1).map(id => { const u = getUserById(id); return u ? u.name : id; });
    preview.innerHTML = `👤 <strong>Responsável:</strong> ${principal ? principal.name : delegateOrderedIds[0]}` +
      (copias.length ? ` · <span style="color:var(--gray-500);">Cópia: ${copias.join(', ')}</span>` : '');
  } else if (preview) {
    preview.innerHTML = '';
  }
}

async function removeDelegacaoCard(cardId, targetUserId) {
  // Remove card da lista do destinatário
  const recipientCards = getCards(targetUserId).filter(c => !(c.delegatedFrom === currentUser.id && c.title === getCards(currentUser.id).find(x => x.id === cardId)?.title));
  await saveCards(targetUserId, recipientCards);

  // Atualiza card original removendo o destinatário
  const cards = getCards(currentUser.id);
  const card = cards.find(c => c.id === cardId);
  if (card) {
    card.delegatedTo = (card.delegatedTo || []).filter(uid => uid !== targetUserId);
    if (card.delegationIdMap) delete card.delegationIdMap[targetUserId];
    await saveCards(currentUser.id, cards);
  }

  // Atualiza seção de delegações no modal sem fechar
  const u = getUserById(targetUserId);
  const uName = u ? u.name : targetUserId;
  showToast(`Delegação para ${uName} removida.`, 'info');
  renderKanban();

  // Re-renderiza lista no modal
  const updatedCard = getCards(currentUser.id).find(c => c.id === cardId);
  const listEl = document.getElementById('deleg-list');
  if (listEl && updatedCard) {
    const remaining = updatedCard.delegatedTo || [];
    listEl.innerHTML = remaining.length === 0
      ? `<div style="font-size:0.82rem;color:var(--gray-400);font-style:italic;">Nenhuma delegação ativa</div>`
      : remaining.map(uid => {
          const usr = getUserById(uid);
          const nm = usr ? usr.name : uid;
          return `<div style="display:flex;align-items:center;justify-content:space-between;background:#f1f5f9;border-radius:6px;padding:6px 10px;">
            <span style="font-size:0.85rem;font-weight:600;">${escHtml(nm)}</span>
            <button onclick="removeDelegacaoCard('${cardId}','${uid}')" style="background:#ef4444;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:0.8rem;">Remover</button>
          </div>`;
        }).join('');
  }
}

function sendDelegation(cardId) {
  if (selectedDelegateUserIds.size === 0) { showToast('Selecione ao menos um destinatário.', 'error'); return; }
  const cards = getCards(currentUser.id);
  const card = cards.find(c => c.id === cardId);
  if (!card) return;
  const msg = document.getElementById('delegate-msg').value.trim();

  const delegations = getDelegations();

  const newDelegationMap = {};
  selectedDelegateUserIds.forEach(toUserId => {
    const delegation = {
      id: genId(),
      fromUserId: currentUser.id,
      fromUserName: currentUser.name,
      toUserId,
      cardId,
      cardTitle: card.title,
      cardDescription: card.description,
      cardPriority: card.priority,
      cardDueDate: card.dueDate,
      message: msg,
      status: 'pending',
      createdAt: new Date().toISOString()
    };
    delegations.push(delegation);

      newDelegationMap[toUserId] = delegation.id;
    // Add card to recipient's board
    const recipientCards = getCards(toUserId);
    recipientCards.push({
      id: genId(),
      title: card.title,
      description: card.description,
      priority: card.priority,
      dueDate: card.dueDate,
      column: 'todo',
      createdAt: new Date().toISOString(),
      delegatedFrom: currentUser.id,
      delegatedFromName: currentUser.name,
      isDelegation: true,
      delegationStatus: 'accepted',
      delegationId: delegation.id
    });
    saveCards(toUserId, recipientCards);

    // Notify recipient
    const notifs = getNotifications(toUserId);
    notifs.push({
      id: genId(),
      type: 'incoming_delegation',
      delegationId: delegation.id,
      fromName: currentUser.name,
      cardTitle: card.title,
      message: msg,
      read: false,
      createdAt: new Date().toISOString()
    });
    saveNotifications(toUserId, notifs);
  });

  // Salva no card original quem foi delegado (na ordem de seleção)
  const delegatedToIds = delegateOrderedIds.length > 0 ? [...delegateOrderedIds] : [...selectedDelegateUserIds];
  card.delegatedTo = [...new Set([...(card.delegatedTo || []), ...delegatedToIds])];
  card.delegationIdMap = Object.assign({}, card.delegationIdMap || {}, newDelegationMap);
  // Primeiro da lista = responsável principal
  if (delegatedToIds.length > 0) card.delegatedMainId = delegatedToIds[0];
  // Move o card do dono para a coluna Delegado
  if (card.column !== 'done') card.column = 'delegated';
  saveCards(currentUser.id, cards);

  saveDelegations(delegations);
  const count = delegatedToIds.length;
  selectedDelegateUserIds = new Set();
  closeModal('delegate-modal-overlay');
  showToast(`Delegado para ${count} pessoa${count > 1 ? 's' : ''}!`, 'success');
  renderVello();
}

          ${n.type === 'delegation_refused' ? `<strong>${escHtml(n.toName)}</strong> recusou a tarefa "<em>${escHtml(n.cardTitle)}</em>"${n.reason ? ': <em>'+escHtml(n.reason)+'</em>' : ''}.` : ''}

          ${n.type === 'task_done' ? `${escHtml(n.message)}` : ''}
          ${n.type === 'shared_card' ? `${escHtml(n.message)}` : ''}

function respondDelegation(delegId, response) {
  const delegations = getDelegations();
  const deleg = delegations.find(d => d.id === delegId);
  if (!deleg) return;
  deleg.status = response;
  saveDelegations(delegations);

  // Update card on current user's board
  const myCards = getCards(currentUser.id);
  const card = myCards.find(c => c.delegationId === delegId);
  if (card) {
    if (response === 'accepted') {
      card.delegationStatus = 'accepted';
      // mantém isDelegation=true para syncDoneToOrigin funcionar ao concluir
    } else {
      // Remove card if refused
      const idx = myCards.indexOf(card);
      myCards.splice(idx, 1);
    }
    saveCards(currentUser.id, myCards);
  }

  // Remove incoming_delegation notification
  const myNotifs = getNotifications(currentUser.id).filter(n => !(n.type === 'incoming_delegation' && n.delegationId === delegId));
  saveNotifications(currentUser.id, myNotifs);

  // Notify original sender
  const senderNotifs = getNotifications(deleg.fromUserId);
  senderNotifs.push({
    id: genId(),
    type: response === 'accepted' ? 'delegation_accepted' : 'delegation_refused',
    delegationId: delegId,
    toName: currentUser.name,
    cardTitle: deleg.cardTitle,
    read: false,
    createdAt: new Date().toISOString()
  });
  saveNotifications(deleg.fromUserId, senderNotifs);

  showToast(response === 'accepted' ? 'Delegação aceita!' : 'Delegação recusada.', response === 'accepted' ? 'success' : 'info');
  renderVello();
}

async function saveDismissedAlerts(userId, refIds) {
  if (!window.__db) return;
  const ref = window.__doc('ou_dismissed_alerts', userId);
  await window.__setDoc(ref, { ids: JSON.stringify([...refIds]), updatedAt: new Date().toISOString() });
}

function getDismissedAlerts(userId) {
  return window._cache.dismissedAlerts?.[userId] || new Set();
}

async function loadDismissedAlerts(userId) {
  if (!window.__db) return;
  if (!window._cache.dismissedAlerts) window._cache.dismissedAlerts = {};
  try {
    const snap = await window.__getDoc(window.__doc('ou_dismissed_alerts', userId));
    if (snap.exists()) {
      const ids = JSON.parse(snap.data().ids || '[]');
      window._cache.dismissedAlerts[userId] = new Set(ids);
    } else {
      window._cache.dismissedAlerts[userId] = new Set();
    }
  } catch(e) {
    window._cache.dismissedAlerts[userId] = new Set();
  }
}

function dismissNotif(notifId) {
  const allNotifs = getNotifications(currentUser.id);
  const dismissed = allNotifs.find(n => n.id === notifId);
  const notifs = allNotifs.filter(n => n.id !== notifId);
  saveNotifications(currentUser.id, notifs);

  // Se for overdue_alert, registra o refId como permanentemente dispensado
  if (dismissed && dismissed.type === 'overdue_alert' && dismissed.refId) {
    if (!window._cache.dismissedAlerts) window._cache.dismissedAlerts = {};
    if (!window._cache.dismissedAlerts[currentUser.id]) window._cache.dismissedAlerts[currentUser.id] = new Set();
    window._cache.dismissedAlerts[currentUser.id].add(dismissed.refId);
    saveDismissedAlerts(currentUser.id, window._cache.dismissedAlerts[currentUser.id]);
  }

  renderInbox();
}

function updateVelloBadge() {
  const delegations = getDelegations().filter(d => d.toUserId === currentUser.id && d.status === 'pending');
  const unreadNotifs = getNotifications(currentUser.id).filter(n => !n.read && n.type !== 'incoming_delegation');
  const total = delegations.length + unreadNotifs.length;
  const badge = document.getElementById('vello-badge');
  if (total > 0) { badge.classList.remove('hidden'); badge.textContent = total; }
  else { badge.classList.add('hidden'); }
}

function checkOverdueAndNotify() {
  const today = new Date(); today.setHours(0,0,0,0);
  const allCards = window._cache.cards || {};
  const overdueCards = [];

  Object.entries(allCards).forEach(([ownerId, cardArray]) => {
    if (!Array.isArray(cardArray)) return;
    cardArray.forEach(card => {
      if (!card.dueDate || card.column === 'done') return;
      const due = card.dueTime
        ? new Date(card.dueDate + 'T' + card.dueTime + ':00')
        : new Date(card.dueDate + 'T23:59:59');
      if (due <= new Date()) overdueCards.push({ ...card, _ownerId: ownerId });
    });
  });

  if (overdueCards.length === 0) return;

  // Monta mapa: recipientId → Set de cards a notificar
  const targetMap = {}; // { recipientId: Set of cards }

  function addTarget(recipientId, card) {
    if (!targetMap[recipientId]) targetMap[recipientId] = new Map();
    targetMap[recipientId].set(card.id, card);
  }

  overdueCards.forEach(card => {
    // ADMs sempre recebem tudo
    addTarget('thais', card);
    addTarget('dra_mone', card);

    // Quem delegou o card também recebe (se for delegação)
    if (card.isDelegation && card.delegatedFrom && card.delegatedFrom !== 'thais' && card.delegatedFrom !== 'dra_mone') {
      addTarget(card.delegatedFrom, card);
    }

    // Supervisores recebem dos seus supervisionados
    Object.entries(SUPERVISORS).forEach(([supervisorId, subordinates]) => {
      if (subordinates.includes(card._ownerId)) addTarget(supervisorId, card);
    });
  });

  Object.entries(targetMap).forEach(([recipientId, cardMap]) => {
    const existingNotifs = getNotifications(recipientId);
    const existingIds = new Set(existingNotifs.filter(n => n.type === 'overdue_alert').map(n => n.refId));
    const dismissedIds = getDismissedAlerts(recipientId);
    const newNotifs = [...existingNotifs];
    let added = 0;

    cardMap.forEach(card => {
      if (existingIds.has(card.id)) return;
      if (dismissedIds.has(card.id)) return; // já foi dispensado pelo usuário
      const ownerUser = getUserById(card._ownerId);
      const ownerName = ownerUser ? ownerUser.name : card._ownerId;
      // Se for o delegador recebendo, mensagem personalizada
      const isDelegator = card.isDelegation && card.delegatedFrom === recipientId;
      const msg = isDelegator
        ? `⚠️ ${ownerName} está com "${card.title}" (que você delegou) em atraso (prazo: ${formatDate(card.dueDate)})`
        : `⚠️ ${ownerName} está com "${card.title}" em atraso (prazo: ${formatDate(card.dueDate)})`;
      newNotifs.push({
        id: 'ovd_' + recipientId + '_' + card.id + '_' + Date.now(),
        type: 'overdue_alert',
        refId: card.id,
        message: msg,
        createdAt: new Date().toISOString(),
        read: false
      });
      added++;
    });

    if (added > 0) saveNotifications(recipientId, newNotifs);
  });
}

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const EVENT_TYPES = { reuniao: 'Reunião', compromisso: 'Compromisso', prazo: 'Prazo', pessoal: 'Pessoal', outro: 'Outro' };

function setCalView(v) {
  calView = v;
  document.getElementById('view-btn-month').classList.toggle('active', v === 'month');
  document.getElementById('view-btn-week').classList.toggle('active', v === 'week');
  document.getElementById('month-view-wrapper').style.display = v === 'month' ? '' : 'none';
  document.getElementById('week-view-wrapper').style.display = v === 'week' ? '' : 'none';
  if (v === 'week' && !calWeekStart) {
    const today = new Date();
    today.setHours(0,0,0,0);
    calWeekStart = new Date(today);
    calWeekStart.setDate(today.getDate() - today.getDay());
  }
  selectedDay = null;
  document.getElementById('day-detail-panel').innerHTML = '';
  renderCalendar();
}

function calNavigatePrev() {
  if (calView === 'week') {
    calWeekStart.setDate(calWeekStart.getDate() - 7);
    renderCalendar();
  } else {
    changeMonth(-1);
  }
}

function calNavigateNext() {
  if (calView === 'week') {
    calWeekStart.setDate(calWeekStart.getDate() + 7);
    renderCalendar();
  } else {
    changeMonth(1);
  }
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  selectedDay = null;
  document.getElementById('day-detail-panel').innerHTML = '';
  renderCalendar();
}

function goToToday() {
  calYear = new Date().getFullYear();
  calMonth = new Date().getMonth();
  const today = new Date();
  today.setHours(0,0,0,0);
  calWeekStart = new Date(today);
  calWeekStart.setDate(today.getDate() - today.getDay());
  selectedDay = null;
  document.getElementById('day-detail-panel').innerHTML = '';
  renderCalendar();
}

function renderWeekView() {
  if (!calWeekStart) {
    const today = new Date();
    today.setHours(0,0,0,0);
    calWeekStart = new Date(today);
    calWeekStart.setDate(today.getDate() - today.getDay());
  }

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(calWeekStart);
    d.setDate(calWeekStart.getDate() + i);
    days.push(d);
  }

  const weekEndDate = days[6];
  const startLabel = calWeekStart.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' });
  const endLabel = weekEndDate.toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', year: 'numeric' });
  document.getElementById('agenda-month-label').textContent = `${startLabel} – ${endLabel}`;

  const events = getVisibleEvents();
  const today = new Date(); today.setHours(0,0,0,0);
  const WEEK_DAYS_SHORT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const HOURS = [];
  for (let h = 0; h < 24; h++) HOURS.push(h);

  // Build header row
  let headerHtml = `<div style="display:grid;grid-template-columns:48px repeat(7,1fr);background:var(--navy);">
    <div class="week-time-header"></div>
    ${days.map(d => {
      const isToday = d.getTime() === today.getTime();
      const dateStr = formatDateStr(d.getFullYear(), d.getMonth(), d.getDate());
      return `<div class="week-day-header ${isToday ? 'today' : ''}" onclick="selectDay('${dateStr}')">
        <div style="font-size:0.72rem;opacity:0.75;">${WEEK_DAYS_SHORT[d.getDay()]}</div>
        <span class="week-day-number">${d.getDate()}</span>
      </div>`;
    }).join('')}
  </div>`;

  // All-day events row
  const allDayEventsPerDay = days.map(d => {
    const dateStr = formatDateStr(d.getFullYear(), d.getMonth(), d.getDate());
    return events.filter(e => e.date === dateStr && !e.startTime);
  });
  const hasAllDay = allDayEventsPerDay.some(arr => arr.length > 0);
  let allDayHtml = '';
  if (hasAllDay) {
    allDayHtml = `<div style="display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:2px solid var(--gray-200);">
      <div class="week-allday-label">dia todo</div>
      ${allDayEventsPerDay.map(arr => `<div class="week-allday-cell">
        ${arr.map(e => `<div class="day-event-pill event-${e.type}" style="margin-bottom:2px;${e.gcalColor ? `background:${e.gcalColor};color:#1e293b;` : ''}" onclick="showEventDetail('${e.id}')">${escHtml(e.title)}</div>`).join('')}
      </div>`).join('')}
    </div>`;
  }

  // Timed rows — build absolute-positioned event blocks per day per column
  // Pre-compute timed events per day
  const timedPerDay = days.map(d => {
    const dateStr = formatDateStr(d.getFullYear(), d.getMonth(), d.getDate());
    return events.filter(e => e.date === dateStr && e.startTime);
  });

  // Find first hour with events (or 7 as default)
  let firstHour = 7;
  timedPerDay.forEach(arr => arr.forEach(e => {
    const h = parseInt((e.startTime||'00:00').split(':')[0], 10);
    if (h < firstHour) firstHour = h;
  }));
  firstHour = Math.max(0, firstHour - 1);

  const slotH = 56; // px per hour slot

  let gridRows = HOURS.slice(firstHour).map(h => {
    const label = h === 0 ? '' : `${String(h).padStart(2,'0')}:00`;
    return `<div style="display:grid;grid-template-columns:48px repeat(7,1fr);min-height:${slotH}px;border-bottom:1px solid var(--gray-200);">
      <div class="week-time-slot">${label}</div>
      ${days.map(() => `<div style="border-right:1px solid var(--gray-200);min-height:${slotH}px;"></div>`).join('')}
    </div>`;
  }).join('');

  const inner = document.getElementById('week-view-inner');
  inner.innerHTML = headerHtml + allDayHtml +
    `<div id="week-scroll" style="overflow-y:auto;max-height:600px;">
      <div id="week-body" style="position:relative;">
        ${gridRows}
        <div id="week-overlay" style="display:grid;grid-template-columns:48px repeat(7,1fr);position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;">
          <div></div>
          ${days.map((d,i) => {
            const dateStr = formatDateStr(d.getFullYear(), d.getMonth(), d.getDate());
            return `<div class="week-drag-col" data-date="${dateStr}" data-col="${i}"
              style="position:relative;min-height:${slotH*(24-firstHour)}px;border-right:1px solid var(--gray-200);pointer-events:auto;cursor:crosshair;">
              ${timedPerDay[i].map(e => {
                const [sh, sm] = (e.startTime||'00:00').split(':').map(Number);
                const [eh, em] = e.endTime ? e.endTime.split(':').map(Number) : [sh+1, sm];
                const topPx = (sh - firstHour + sm/60) * slotH;
                const heightPx = Math.max(((eh - sh) + (em - sm)/60) * slotH, 22);
                const bgColor = e.gcalColor || null;
                const cls = bgColor ? '' : `event-${e.type}`;
                return `<div class="week-event-block day-event-pill ${cls}"
                  style="top:${topPx}px;height:${heightPx}px;${bgColor ? `background:${bgColor};color:#1e293b;` : ''}"
                  onclick="event.stopPropagation();showEventDetail('${e.id}')">
                  <strong>${e.startTime}</strong> ${escHtml(e.title)}
                </div>`;
              }).join('')}
            </div>`;
          }).join('')}
        </div>
        <div id="week-drag-preview" style="display:none;position:absolute;background:rgba(139,45,66,0.25);border:2px solid var(--navy);border-radius:4px;pointer-events:none;z-index:10;left:0;width:0;"></div>
      </div>
    </div>`;

  // ---- drag-to-create ----
  _weekSlotH = slotH;
  _weekFirstHour = firstHour;
  _weekDragState = null;

  document.querySelectorAll('.week-drag-col').forEach(col => {
    col.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (e.target.classList.contains('week-event-block') || e.target.closest('.week-event-block')) return;
      e.preventDefault();
      const rect = col.getBoundingClientRect();
      const scroll = document.getElementById('week-scroll')?.scrollTop || 0;
      const startY = e.clientY - rect.top + scroll;
      _weekDragState = { col, date: col.dataset.date, startY, endY: startY + _weekSlotH };
      weekRenderDragPreview();
    });
  });
}

function weekPxToTime(py) {
  const totalMins = (py / _weekSlotH) * 60 + _weekFirstHour * 60;
  const h = Math.floor(totalMins / 60);
  const m = Math.round((totalMins % 60) / 15) * 15;
  const hh = Math.min(h + (m === 60 ? 1 : 0), 23);
  const mm = m === 60 ? 0 : m;
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

function weekRenderDragPreview() {
  if (!_weekDragState) return;
  const preview = document.getElementById('week-drag-preview');
  const body = document.getElementById('week-body');
  if (!preview || !body) return;
  const minY = Math.min(_weekDragState.startY, _weekDragState.endY);
  const maxY = Math.max(_weekDragState.startY, _weekDragState.endY);
  const colRect = _weekDragState.col.getBoundingClientRect();
  const bodyRect = body.getBoundingClientRect();
  preview.style.display = 'block';
  preview.style.left = (colRect.left - bodyRect.left + 2) + 'px';
  preview.style.width = (colRect.width - 4) + 'px';
  preview.style.top = minY + 'px';
  preview.style.height = Math.max(maxY - minY, _weekSlotH / 2) + 'px';
  preview.title = `${weekPxToTime(minY)} – ${weekPxToTime(Math.max(maxY, minY + _weekSlotH / 2))}`;
}

document.addEventListener('mousemove', function(e) {
  if (!_weekDragState) return;
  const col = _weekDragState.col;
  const rect = col.getBoundingClientRect();
  const scroll = document.getElementById('week-scroll')?.scrollTop || 0;
  _weekDragState.endY = e.clientY - rect.top + scroll;
  weekRenderDragPreview();
});

document.addEventListener('mouseup', function(e) {
  if (!_weekDragState) return;
  const preview = document.getElementById('week-drag-preview');
  if (preview) preview.style.display = 'none';
  const minY = Math.min(_weekDragState.startY, _weekDragState.endY);
  const maxY = Math.max(_weekDragState.startY, _weekDragState.endY);
  const startTime = weekPxToTime(minY);
  const endTime = weekPxToTime(Math.max(maxY, minY + _weekSlotH / 2));
  const date = _weekDragState.date;
  _weekDragState = null;
  if (startTime === endTime) return;
  openEventModal(null, date, startTime, endTime);
});

function getVisibleEvents() {
  const all = getAgenda();
  return all.filter(e => {
    // Evento pessoal → só o criador vê
    if (e.type === 'pessoal') return e.createdBy === currentUser.id;
    // Evento para todos → todos veem
    if (e.assignedTo === 'all') return true;
    // Próprio criador sempre vê o próprio evento
    if (e.createdBy === currentUser.id) return true;
    // Participante explicitamente incluído vê o evento
    if (Array.isArray(e.assignedTo) && e.assignedTo.includes(currentUser.id)) return true;
    return false;
  });
}

// LIMPEZA DE AUTO-COMPARTILHAMENTOS LEGADOS COM DRA. MONE

async function cleanupAutoSharedWithMone() {
  // Remove cópias auto-compartilhadas (sharedOriginId) do perfil da Dra. Mone
  const moneCards = getCards('dra_mone');
  const toRemoveOriginIds = new Set();
  const cleanedMone = moneCards.filter(c => {
    if (c.sharedOriginId) { toRemoveOriginIds.add(c.sharedOriginId); return false; }
    return true;
  });
  if (cleanedMone.length < moneCards.length) {
    window._cache.cards['dra_mone'] = cleanedMone;
    await saveCards('dra_mone', cleanedMone);
    console.log('[cleanup] Removidas', moneCards.length - cleanedMone.length, 'cópias do perfil da Dra. Mone');
  }

  // Remove 'dra_mone' de sharedWith nos cards originais de outros usuários
  const allCards = window._cache.cards || {};
  for (const [ownerId, cardArray] of Object.entries(allCards)) {
    if (ownerId === 'dra_mone') continue;
    if (!Array.isArray(cardArray)) continue;
    let changed = false;
    const updated = cardArray.map(c => {
      if (!Array.isArray(c.sharedWith) || !c.sharedWith.includes('dra_mone')) return c;
      changed = true;
      const newSharedWith = c.sharedWith.filter(id => id !== 'dra_mone');
      return { ...c, sharedWith: newSharedWith };
    });
    if (changed) {
      window._cache.cards[ownerId] = updated;
      await saveCards(ownerId, updated);
      console.log('[cleanup] Removido sharedWith dra_mone dos cards de', ownerId);
    }
  }
}

let _pendFilter = 'all';
function setPendFilter(f) {
  _pendFilter = f;
  const btnAll = document.getElementById('pend-filter-all');
  const btnOverdue = document.getElementById('pend-filter-overdue');
  if (btnAll) { btnAll.style.background = f === 'all' ? '#7c1c3e' : '#fff'; btnAll.style.color = f === 'all' ? '#fff' : '#6b7280'; }
  if (btnOverdue) { btnOverdue.style.background = f === 'overdue' ? '#ef4444' : '#fff'; btnOverdue.style.color = f === 'overdue' ? '#fff' : '#6b7280'; }
  renderPendentes();
}

function renderPendentes() {
  const wrap = document.getElementById('pendentes-content');
  if (!wrap) return;

  const allCards = window._cache.cards || {};
  const now = new Date();
  const pendList = []; // { card, ownerId, ownerName, ownerColor, overdue }

  // ADMs e Jarina veem todos; outros supervisores veem só seus subordinados
  const isAdm = ['thais', 'dra_mone', 'jarina'].includes(currentUser.id);
  const allowedOwners = isAdm ? null : (SUPERVISORS[currentUser.id] || []);

  // Pré-computa: para cada (fromUserId, cardTitle) quais userIds receberam delegação ativa
  // Chave: `${fromUserId}::${cardId}` → Set de delegToIds
  const delegReceivedMap = new Map();
  Object.entries(allCards).forEach(([recipientId, cardArray]) => {
    if (!Array.isArray(cardArray)) return;
    cardArray.forEach(c => {
      if (!c.delegatedFrom) return; // qualquer card com delegatedFrom é cópia recebida
      if (c.column === 'done') return;
      // Usa delegationId se existir, senão usa título como fallback
      const key = c.delegationId
        ? `id::${c.delegationId}`
        : `title::${c.delegatedFrom}::${c.title}`;
      if (!delegReceivedMap.has(key)) delegReceivedMap.set(key, new Set());
      delegReceivedMap.get(key).add(recipientId);
    });
  });

  // Função auxiliar: retorna Set de recipientes ativos para um card do dono
  function getActiveDelegatees(ownerId, card) {
    const result = new Set([
      ...(card.delegatedTo || []),
      ...Object.keys(card.delegationIdMap || {})
    ]);
    // Também cruza com os cards reais recebidos (robusto para dados antigos)
    const keyById = card.id ? delegReceivedMap.get(`id::${card.id}`) : null;
    const keyByTitle = delegReceivedMap.get(`title::${ownerId}::${card.title}`);
    if (keyById) keyById.forEach(id => result.add(id));
    if (keyByTitle) keyByTitle.forEach(id => result.add(id));
    return result;
  }

  // Deduplicação final por (ownerId, cardId) para evitar entradas repetidas
  const pendListKeys = new Set();

  // Normaliza allCards para evitar duplicação por hífen vs underscore
  const seenOwners = new Set();
  const normalizedCards = {};
  Object.entries(allCards).forEach(([ownerId, cardArray]) => {
    const normId = ownerId.replace(/-/g, '_');
    if (!normalizedCards[normId]) normalizedCards[normId] = [];
    (cardArray || []).forEach(c => { if (!normalizedCards[normId].find(x => x.id === c.id)) normalizedCards[normId].push(c); });
  });

  Object.entries(normalizedCards).forEach(([ownerId, cardArray]) => {
    if (!Array.isArray(cardArray)) return;
    const myNorm = (currentUser.id || '').replace(/-/g,'_');
    if (ownerId === myNorm) return;
    if (!isAdm && allowedOwners && !allowedOwners.includes(ownerId) && !allowedOwners.includes(ownerId.replace(/_/g,'-'))) return;
    const owner = getUserById(ownerId);
    cardArray.forEach(card => {
      if (card.column === 'done') return;
      if (card.sharedOriginId) return;

      // Regra 1: card delegado do dono para outro — NÃO mostra no dono
      // só aparece se o destinatário realmente tem o card e ainda não concluiu
      const delegateesIds = getActiveDelegatees(ownerId, card);
      if (delegateesIds.size > 0 && !card.delegatedFrom) {
        // É card do dono que foi delegado → mostra no destinatário
        delegateesIds.forEach(delegToId => {
          if (delegToId === currentUser.id) return;
          if (!isAdm && allowedOwners && !allowedOwners.includes(delegToId)) return;
          const receivedCard = (allCards[delegToId] || []).find(c => c.delegatedFrom === ownerId && c.title === card.title);
          if (!receivedCard) return;
          if (receivedCard.column === 'done') return;
          const key = `${delegToId}::${receivedCard.id}`;
          if (pendListKeys.has(key)) return;
          pendListKeys.add(key);
          const delegUser = getUserById(delegToId);
          const hasDate = !!receivedCard.dueDate;
          let overdue = false;
          if (hasDate) {
            const due = receivedCard.dueTime
              ? new Date(receivedCard.dueDate + 'T' + receivedCard.dueTime + ':00')
              : new Date(receivedCard.dueDate + 'T23:59:59');
            overdue = due <= now;
          }
          pendList.push({ card: receivedCard, ownerId: delegToId, ownerName: delegUser ? delegUser.name : delegToId, ownerColor: delegUser?.color || '#888', overdue, originalOwnerId: ownerId });
        });
        return;
      }

      // Regra 2: card recebido por delegação OU card próprio sem delegação → mostra no responsável (ownerId)
      const key = `${ownerId}::${card.id}`;
      if (pendListKeys.has(key)) return;
      pendListKeys.add(key);
      const hasDate = !!card.dueDate;
      let overdue = false;
      if (hasDate) {
        const due = card.dueTime
          ? new Date(card.dueDate + 'T' + card.dueTime + ':00')
          : new Date(card.dueDate + 'T23:59:59');
        overdue = due <= now;
      }
      pendList.push({ card, ownerId, ownerName: owner ? owner.name : ownerId, ownerColor: owner?.color || '#888', overdue });
    });
  });

  // Atualiza badge (sempre com total real, independente do filtro)
  const overdueCnt = pendList.filter(p => p.overdue).length;
  const badge = document.getElementById('pendentes-badge');
  if (badge) {
    if (overdueCnt > 0) { badge.textContent = overdueCnt; badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
  }

  // Aplica filtro
  const filteredList = _pendFilter === 'overdue' ? pendList.filter(p => p.overdue) : pendList;

  if (filteredList.length === 0) {
    wrap.innerHTML = `<div class="pendentes-empty">${_pendFilter === 'overdue' ? '✅ Nenhuma tarefa fora do prazo.' : '✅ Nenhuma tarefa pendente na equipe.'}</div>`;
    return;
  }

  // Ordena filteredList: primeiro atrasados, depois por nome
  filteredList.sort((a, b) => {
    if (a.overdue !== b.overdue) return a.overdue ? -1 : 1;
    return a.ownerName.localeCompare(b.ownerName);
  });

  // Agrupa por dono
  const byOwner = new Map();
  filteredList.forEach(p => {
    if (!byOwner.has(p.ownerId)) byOwner.set(p.ownerId, { name: p.ownerName, color: p.ownerColor, items: [] });

  });

  const totalPend = filteredList.length;
  const headerLabel = _pendFilter === 'overdue' ? '⚠️ Fora do Prazo' : '⚠️ Tarefas Pendentes da Equipe';
  let html = `<div class="pendentes-header">${headerLabel} <span class="count">${totalPend} tarefa${totalPend !== 1 ? 's' : ''}</span></div>`;

  byOwner.forEach(({ name, color, items }, ownerId) => {
    const overdueItems = items.filter(i => i.overdue);
    const initial = name.charAt(0).toUpperCase();
    html += `
      <div class="pendentes-person">

          <div class="pendentes-person-avatar" style="background:${color};">${initial}</div>
          <div style="flex:1;min-width:0;">

            <div class="pendentes-person-count">${items.length} tarefa${items.length !== 1 ? 's' : ''}${overdueItems.length > 0 ? ` &nbsp;·&nbsp; <span style="color:#ef4444;font-weight:700;">⚠️ ${overdueItems.length} em atraso</span>` : ''}</div>
          </div>
        </div>
        ${items.map(({ card, ownerId, overdue, originalOwnerId }) => {
          const realOwnerId = originalOwnerId || ownerId;
          const chatId = 'cobrar__' + ownerId + '__' + card.id;
          const chats = window._cache.chats || {};
          const hasChat = !!(chats[chatId] && chats[chatId].length > 0);
          const unread = window._cache.chatUnread?.[chatId]?.[currentUser?.id];
          const btnClass = 'pendentes-cobrar-btn' + (hasChat ? ' has-chat' : '');
          const btnLabel = unread ? `💬 Chat (${unread})` : hasChat ? '💬 Ver chat' : '💬 Cobrar';
          return `
            <div class="pendentes-card-row${overdue ? ' overdue-row' : ''}">
              <div class="pendentes-card-info">
                <div class="pendentes-card-title">${escHtml(card.title)}</div>
                <div class="pendentes-card-meta">
                  ${overdue
                    ? `<span style="color:#ef4444;font-weight:600;">🔴 Em atraso</span>`
                    : card.dueDate
                      ? `<span style="color:#ef4444;font-weight:600;">🔴 Pendente</span>`
                      : `<span style="color:#2563eb;font-weight:600;">🔵 Sem prazo</span>`}
                  ${card.dueDate ? ` · 📅 ${formatDate(card.dueDate)}` : ''}
                  ${card.priority ? ` · ${card.priority === 'high' ? '🔥 Alta' : card.priority === 'medium' ? '⚡ Média' : '· Baixa'}` : ''}
                </div>
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0;">
                <button class="pendentes-cobrar-btn" style="background:#f59e0b;" onclick="editPrazoPendente('${ownerId}','${card.id}')" title="Editar prazo">📅</button>
                <button class="${btnClass}" onclick="openCobrarChat('${chatId}','${escHtml(card.title).replace(/'/g,"\\'")}','${ownerId}','${card.id}')">${btnLabel}</button>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  });

  wrap.innerHTML = html;
}

function openCobrarChatFromNotif(chatId) {
  // chatId formato: cobrar__ownerId__cardId
  const parts = chatId.split('__');
  const ownerId = parts[1];
  const cardId = parts[2];
  const allCards = window._cache.cards || {};
  const ownerCards = allCards[ownerId] || [];
  const card = ownerCards.find(c => c.id === cardId);
  const title = card ? card.title : 'Tarefa';
  openCobrarChat(chatId, title, ownerId, cardId);
}

async function sendCobrarMsg(chatId, ownerId, cardId) {
  const input = document.getElementById('cobrar-msg-input');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';

  if (!window._cache.chats) window._cache.chats = {};
  if (!window._cache.chats[chatId]) window._cache.chats[chatId] = [];
  const msg = { id: genId(), userId: currentUser.id, userName: currentUser.name, text, createdAt: new Date().toISOString() };
  window._cache.chats[chatId].push(msg);

  if (!window._cache.chatUnread) window._cache.chatUnread = {};
  const unread = { ...(window._cache.chatUnread[chatId] || {}) };

  // Descobre o destinatário: se sou o dono, notifica o cobrador (parts[1] do chatId é o ownerId)
  // chatId = cobrar__ownerId__cardId → cobrador NÃO está no chatId, mas é quem não é o ownerId
  // Participantes: o dono (ownerId) e quem mandou a cobrança (currentUser se for o cobrador, ou outro)
  const chatParts = chatId.split('__');
  const cardOwnerId = chatParts[1]; // dono do card original
  const recipientId = currentUser.id === cardOwnerId
    ? (() => { // dono respondendo: notifica último cobrador (quem enviou a última msg que não é o dono)
        const msgs = window._cache.chats[chatId] || [];
        const lastOther = [...msgs].reverse().find(m => m.userId !== cardOwnerId);
        return lastOther ? lastOther.userId : null;
      })()
    : cardOwnerId; // cobrador enviando: notifica o dono

  if (recipientId) unread[recipientId] = (unread[recipientId] || 0) + 1;
  window._cache.chatUnread[chatId] = unread;

  if (window.__setDoc) {
    await window.__setDoc(window.__doc('ou_chats', chatId), {
      messages: JSON.stringify(window._cache.chats[chatId]),
      unread: JSON.stringify(unread)
    }).catch(() => null);
  }

  if (recipientId) {
    const allC = window._cache.cards || {};
    const cardForNotif = (allC[cardOwnerId] || []).find(c => c.id === cardId);
    const cardTitleForNotif = cardForNotif ? cardForNotif.title : 'tarefa pendente';
    const recipientNotifs = getNotifications(recipientId);
    const filteredNotifs = recipientNotifs.filter(n => !(n.type === 'cobrar_chat' && n.refId === chatId));
    filteredNotifs.push({
      id: genId(),
      type: 'cobrar_chat',
      refId: chatId,
      message: `💬 ${currentUser.name} ${currentUser.id === cardOwnerId ? 'respondeu' : 'cobrou'}: "${cardTitleForNotif}"`,
      read: false,
      createdAt: new Date().toISOString()
    });
    saveNotifications(recipientId, filteredNotifs);
  }

  // Re-renderiza o chat aberto com layout WhatsApp
  const el = document.getElementById('cobrar-chat-messages');
  if (el) {
    el.innerHTML = window._cache.chats[chatId].map(m => _chatMsgHtml(m, m.userId === currentUser.id)).join('');
    el.scrollTop = el.scrollHeight;
  }
  // Toast no canto da tela
  const recipUser = recipientId ? getUserById(recipientId) : null;
  if (recipUser) {
    const rPhoto = getPhoto(recipientId);
    const rColor = recipUser.color || '#6A1F30';
    const rInitials = recipUser.name.replace(/^(Dr\.|Dra\.)\s*/i,'').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const avatarImg = rPhoto
      ? `<img src="${rPhoto}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;">`
      : `<div style="width:36px;height:36px;border-radius:50%;background:${rColor};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;">${rInitials}</div>`;
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:99999;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:280px;animation:slideInRight .3s ease;';
    t.innerHTML = avatarImg + `<div><div style="font-size:12px;font-weight:700;">Mensagem enviada para ${escHtml(recipUser.name)}</div><div style="font-size:11px;color:#94a3b8;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(text)}</div></div>`;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(),400); }, 2800);
  }
  input?.focus();
}

function renderCalendar() {
  if (calView === 'week') {
    renderWeekView();
    renderOverdueTeamPanel();
    return;
  }
  document.getElementById('agenda-month-label').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const events = getVisibleEvents();

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();
  today.setHours(0,0,0,0);

  const cells = [];
  // Previous month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: prevMonthDays - i, month: calMonth - 1, year: calYear, other: true });
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, month: calMonth, year: calYear, other: false });
  }
  // Next month padding
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++) {
    cells.push({ day: d, month: calMonth + 1, year: calYear, other: true });
  }

  const container = document.getElementById('calendar-days');
  container.innerHTML = cells.map(cell => {
    const dateStr = formatDateStr(cell.year, cell.other ? (cell.month < 0 ? 11 : cell.month > 11 ? 0 : cell.month) : cell.month, cell.day);
    const cellDate = new Date(dateStr + 'T00:00:00');
    const isToday = cellDate.getTime() === today.getTime() && !cell.other;
    const dayEvents = cell.other ? [] : events.filter(e => e.date === dateStr);
    const isSelected = selectedDay === dateStr && !cell.other;

    return `<div class="calendar-day ${cell.other ? 'other-month' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${dayEvents.length ? 'has-events' : ''}"
      style="${isSelected ? 'background:#e0f2fe;outline:2px solid var(--cyan);outline-offset:-2px;' : ''}"
      onclick="${!cell.other ? `selectDay('${dateStr}')` : ''}">
      <div class="day-number">${cell.day}</div>
      <div class="day-events">
        ${dayEvents.slice(0,3).map(e => `<div class="day-event-pill event-${e.type}" style="${e.gcalColor ? `background:${e.gcalColor};color:#1e293b;` : ''}" onclick="event.stopPropagation();showEventDetail('${e.id}')">${e.startTime ? escHtml(e.startTime)+' ' : ''}${escHtml(e.title)}</div>`).join('')}
        ${dayEvents.length > 3 ? `<div class="day-event-pill" style="background:var(--gray-200);color:var(--gray-600);">+${dayEvents.length-3} mais</div>` : ''}
      </div>
    </div>`;
  }).join('');
  renderOverdueTeamPanel();
}

function selectDay(dateStr) {
  selectedDay = dateStr;

  renderDayDetail(dateStr);
}

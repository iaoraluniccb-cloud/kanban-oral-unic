function toggleEventUser(uid) {
  if (!window._eventAssignedUsers) window._eventAssignedUsers = [];
  const idx = window._eventAssignedUsers.indexOf(uid);
  if (idx === -1) window._eventAssignedUsers.push(uid);
  else window._eventAssignedUsers.splice(idx, 1);
  document.querySelectorAll('.multi-user-pick-btn').forEach(b => {
    b.classList.toggle('selected', window._eventAssignedUsers.includes(b.dataset.uid));
  });
}

function saveEvent(eventId, isAdminStr) {
  const isAdmin = isAdminStr === '1';
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { showToast('Informe o título do evento.', 'error'); return; }
  const date = document.getElementById('ev-date').value;
  if (!date) { showToast('Informe a data.', 'error'); return; }
  const desc = document.getElementById('ev-desc').value.trim();
  const type = document.getElementById('ev-type').value;
  const start = document.getElementById('ev-start').value;
  const end = document.getElementById('ev-end').value;
  const repeat = document.getElementById('ev-repeat')?.value || 'none';
  const repeatUntil = document.getElementById('ev-repeat-until')?.value || '';
  if (repeat !== 'none' && !repeatUntil) { showToast('Informe a data final da repetição.', 'error'); return; }

  let assignedTo;
  if (isAdmin && window._eventAssignAll) {
    assignedTo = 'all';
  } else {
    assignedTo = window._eventAssignedUsers && window._eventAssignedUsers.length > 0
      ? window._eventAssignedUsers
      : [currentUser.id];
  }

  const events = getAgenda();
  if (eventId) {
    const ev = events.find(e => e.id === eventId);
    if (ev) {
      ev.title = title;
      ev.description = desc;
      ev.date = date;
      ev.type = type;
      ev.startTime = start;
      ev.endTime = end;
      ev.assignedTo = assignedTo;
      ev.repeat = repeat;
      ev.repeatUntil = repeatUntil;
    }
    showToast('Evento atualizado!', 'success');
  } else {
    const seriesId = (repeat !== 'none') ? genId() : undefined;
    const baseEvent = {
      id: genId(),
      title,
      description: desc,
      date,
      startTime: start,
      endTime: end,
      type,
      assignedTo,
      repeat,
      repeatUntil,
      seriesId,
      createdBy: currentUser.id,
      createdByName: currentUser.name,
      createdAt: new Date().toISOString()
    };
    events.push(baseEvent);

    // Gera ocorrências repetidas
    if (repeat !== 'none' && repeatUntil) {
      const intervalDays = repeat === 'weekly' ? 7 : 14;
      const [ly, lm, ld] = repeatUntil.split('-').map(Number);
      const limitDate = new Date(ly, lm - 1, ld);
      const [sy, sm, sd] = date.split('-').map(Number);
      let curYear = sy, curMonth = sm - 1, curDay = sd;
      let count = 0;
      while (count < 104) {
        curDay += intervalDays;
        // Normaliza dia acumulado para mês/ano correto
        const tmp = new Date(curYear, curMonth, curDay);
        curYear = tmp.getFullYear(); curMonth = tmp.getMonth(); curDay = tmp.getDate();
        if (tmp > limitDate) break;
        const d = curYear + '-' + String(curMonth + 1).padStart(2,'0') + '-' + String(curDay).padStart(2,'0');
        events.push({ ...baseEvent, id: genId(), date: d, createdAt: new Date().toISOString() });
        count++;
      }
    }
    const label = repeat === 'weekly' ? ' (semanal)' : repeat === 'biweekly' ? ' (quinzenal)' : '';
    showToast('Evento adicionado' + label + '!', 'success');
  }
  saveAgenda(events);
  closeModal('event-modal-overlay');

  // Navigate to the event's month
  const evDate = new Date(date + 'T00:00:00');
  calYear = evDate.getFullYear();
  calMonth = evDate.getMonth();
  selectedDay = date;
  renderCalendar();
  renderDayDetail(date);
}

// ============================================================
// MODAL HELPERS
// ============================================================
function renderModal(html) {
  document.getElementById('modal-root').innerHTML = html;
  document.addEventListener('keydown', handleEsc);
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  document.removeEventListener('keydown', handleEsc);
  selectedDelegateUserIds = new Set();
}

function closeOnOverlay(e, id) {
  if (e.target.id === id) closeModal(id);
}

function handleEsc(e) {
  if (e.key === 'Escape') {
    const overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
    document.removeEventListener('keydown', handleEsc);
  }
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 350);
  }, 3000);
}

// ============================================================
// UTILS
// ============================================================
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(str) { return escHtml(str); }

function cap(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function formatDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function formatDateBR(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function formatDateStr(year, month, day) {
  const m = ((month % 12) + 12) % 12;
  const y = month < 0 ? year - 1 : month > 11 ? year + 1 : year;
  return `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'agora';
  if (mins < 60) return `${mins}min atrás`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h atrás`;
  const days = Math.floor(hrs / 24);
  return `${days}d atrás`;
}

async function diagCards() {
  if (!window.__db) { alert('Banco não conectado'); return; }

  if (!snap) { alert('Erro ao ler banco'); return; }
  let report = '';

    report += `${d.id}: ${cards.length} cards\n`;
    window._cache.cards[d.id] = cards;
  });
  alert('Dados no banco:\n' + report);
  renderKanban();

// ============================================================
// INIT
// ============================================================
let _initDone = false;

function init() {
  if (_initDone) {
    // Firebase chegou tarde (após o fallback de 3s já ter rodado init()).
    // Só carrega os dados sem reiniciar o app — evita o "aparece e some".
    if (window.__db) {
      startRealtimeListeners();
      migrateLocalPhotosToFirestore();
      if (currentUser) {
        loadInitialData(currentUser.id).then(() => {
          renderVello();
          if (document.getElementById('agenda-tab')?.classList.contains('active')) renderCalendar();
          if (document.getElementById('pendentes-tab')?.classList.contains('active')) renderPendentes();
        }).catch(() => {});
      }
    }
    return;
  }
  _initDone = true;

  // Dentro do athena-unified (iframe): esconde o header próprio e a tela de login — o athena já tem o seu
  if (window !== window.top) {
    const hdr = document.querySelector('.app-header');
    if (hdr) hdr.style.display = 'none';
    // Em modo iframe: ajusta o #app para scroll correto
    const appEl = document.getElementById('app');
    if (appEl) {
      appEl.style.overflowY = 'auto';
      appEl.style.height = '100%';
      appEl.style.background = '#fdf9f4';
    }
    // Se há uid na URL, esconde a tela de login imediatamente (sem esperar Firebase)
    const _iframeUid = new URLSearchParams(window.location.search).get('uid');
    if (_iframeUid && getUserById(_iframeUid)) {
      const ls = document.getElementById('login-screen');
      if (ls) ls.style.display = 'none';
      if (appEl) appEl.style.display = 'flex';
    }
  } else {
    // Standalone: esconde o botão da aba que não é a inicial
    const _initTabStandalone = new URLSearchParams(window.location.search).get('tab');
    if (_initTabStandalone === 'agenda') {
      const vBtn = document.getElementById('tab-vello-btn');
      if (vBtn) vBtn.style.display = 'none';
    } else if (_initTabStandalone === 'vello') {
      const aBtn = document.getElementById('tab-agenda-btn');
      if (aBtn) aBtn.style.display = 'none';
    }
  }

  renderLogin();
  // Inicia listeners globais (agenda, delegações) assim que Firebase estiver pronto
  startRealtimeListeners();
  // Migra fotos locais para Firestore imediatamente (sem aguardar login)
  if (window.__db) migrateLocalPhotosToFirestore();

  // Auto-login via parâmetro de URL (enviado pelo athena-unified)
  const _urlUser = new URLSearchParams(window.location.search).get('uid');
  if (_urlUser && getUserById(_urlUser)) {
    setCurrentUserId(_urlUser);
  }
  const savedUser = getCurrentUserId();
  if (savedUser && getUserById(savedUser)) {
    login(savedUser);
  }
}

// Aguarda Firebase estar pronto antes de iniciar
if (window.__fbReady) {
  init();
} else {
  document.addEventListener('firebase-ready', init, { once: true });
  // Fallback: se Firebase demorar mais de 3s, inicia sem ele (modo offline)
  setTimeout(() => { if (!window.__fbReady) init(); }, 3000);
}
</script>

<script>
// ============================================================
// GOOGLE CALENDAR INTEGRATION
// ============================================================
const GCAL_CLIENT_ID = '878566113583-q4t0n31s4hm4bf6hkv8jos95mtu5d6kt.apps.googleusercontent.com';
const GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

let _gcalTokenClient = null;
let _gcalAccessToken = null;

function initGoogleCalendar() {
  if (!window.google?.accounts?.oauth2) return;
  _gcalTokenClient = window.google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPES,
    callback: (response) => {
      if (response.error) { showToast('Erro ao conectar Google Agenda', 'error'); return; }
      _gcalAccessToken = response.access_token;
      // Salva token no cache do usuário
      if (!window._cache.gcalTokens) window._cache.gcalTokens = {};
      window._cache.gcalTokens[currentUser.id] = response.access_token;
      localStorage.setItem('ou_gcal_' + currentUser.id, response.access_token);
      showToast('Google Agenda conectada!', 'success');
      updateGcalBtn();
      fetchGoogleCalendarEvents();
    }
  });
}

function connectGoogleCalendar() {
  if (!_gcalTokenClient) {
    showToast('Google ainda carregando, tente novamente em segundos', 'info');
    setTimeout(initGoogleCalendar, 1000);
    return;
  }
  _gcalTokenClient.requestAccessToken();
}

function disconnectGoogleCalendar() {
  _gcalAccessToken = null;
  localStorage.removeItem('ou_gcal_' + currentUser.id);
  if (window._cache.gcalTokens) delete window._cache.gcalTokens[currentUser.id];
  // Remove eventos do Google da agenda
  const agenda = getAgenda().filter(e => e.source !== 'google');
  saveAgenda(agenda);
  showToast('Google Agenda desconectada', 'info');
  updateGcalBtn();
  renderCalendar();
}

// Mapa usuário → URL embed Google Calendar
const GCAL_EMBEDS = {
  // Embeds desativados — usando OAuth nativo
  // 'thais':    'https://...',
  // 'dra-mone': 'https://...',
};

function _atualizarGcalEmbed() {
  const embed = document.getElementById('gcal-embed-panel');
  const iframe = document.getElementById('gcal-embed-iframe');
  const monthWrap = document.getElementById('month-view-wrapper');
  const weekWrap = document.getElementById('week-view-wrapper');
  const gcalBtn = document.getElementById('gcal-connect-btn');
  const addBtn = document.getElementById('add-event-btn');
  if (!embed || !iframe) return;
  const userId = currentUser?.id;
  const url = GCAL_EMBEDS[userId];
  if (url) {
    if (iframe.src !== url) iframe.src = url;
    embed.style.display = 'block';
    if (monthWrap) monthWrap.style.display = 'none';
    if (weekWrap) weekWrap.style.display = 'none';
    if (gcalBtn) gcalBtn.style.display = 'none';
    if (addBtn) addBtn.style.display = 'none';
  } else {
    embed.style.display = 'none';
    if (gcalBtn) gcalBtn.style.display = 'flex';
    if (addBtn) addBtn.style.display = '';

}

function updateGcalBtn() {
  const btn = document.getElementById('gcal-connect-btn');
  if (!btn) return;
  const token = _gcalAccessToken || localStorage.getItem('ou_gcal_' + currentUser?.id);
  if (token) {
    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:16px;height:16px;"> Agenda Conectada ✓';
    btn.style.background = '#e8f5e9';
    btn.style.borderColor = '#4caf50';
    btn.style.color = '#2e7d32';
    btn.onclick = disconnectGoogleCalendar;
  } else {
    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:16px;height:16px;"> Google Agenda';
    btn.style.background = '#fff';
    btn.style.borderColor = '#4285f4';
    btn.style.color = '#4285f4';
    btn.onclick = connectGoogleCalendar;
  }
}

let _fetchGcalLock = false;
async function fetchGoogleCalendarEvents() {
  if (_fetchGcalLock) return; // evita chamadas paralelas que causam duplicatas
  const token = _gcalAccessToken || localStorage.getItem('ou_gcal_' + currentUser?.id);
  if (!token || !currentUser) return;
  _fetchGcalLock = true;

  try {
    // Busca 3 meses para trás + 12 meses para frente — garante que eventos passados também são sincronizados
    const past = new Date();
    past.setMonth(past.getMonth() - 3);
    const future = new Date();
    future.setMonth(future.getMonth() + 12);
    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${past.toISOString()}&timeMax=${future.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=500`;

    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) {
      if (res.status === 401) {
        // Token expirado
        localStorage.removeItem('ou_gcal_' + currentUser.id);
        _gcalAccessToken = null;
        updateGcalBtn();
      }
      return;
    }
    const data = await res.json();
    const gcalEvents = (data.items || []).map(item => {
      const date = (item.start?.dateTime || item.start?.date || '').substring(0, 10);
      let startTime = '', endTime = '';
      if (item.start?.dateTime) {
        const fmt = t => new Date(t).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        startTime = fmt(item.start.dateTime);
        if (item.end?.dateTime) endTime = fmt(item.end.dateTime);
      }
      // Cores do Google Calendar (colorId → hex)
      const GCAL_COLORS = {
        '1':'#a4bdfc','2':'#7ae7bf','3':'#dbadff','4':'#ff887c',
        '5':'#fbd75b','6':'#ffb878','7':'#46d6db','8':'#e1e1e1',
        '9':'#5484ed','10':'#51b749','11':'#dc2127'
      };
      const gcalColor = item.colorId ? GCAL_COLORS[item.colorId] : null;

      return {
        id: 'gcal_' + item.id,
        title: item.summary || '(sem título)',
        date,
        startTime,
        endTime,
        type: 'compromisso',
        assignedTo: [currentUser.id],
        createdBy: currentUser.id,
        createdByName: currentUser.name,
        source: 'google',
        gcalColor,
        gcalLink: item.htmlLink,
        location: item.location || '',
        description: item.description || ''
      };
    }).filter(e => e.date);

    // Remove TODOS os eventos do usuário atual e substitui exatamente pelo que veio do Google
    // Inclui passado (3 meses) + futuro (12 meses) — sem eventos órfãos de sincronizações anteriores
    const existingAgenda = getAgenda().filter(e => e.createdBy !== currentUser.id);
    // Deduplica pelo id canônico
    const seen = new Set();
    const gcalUnicos = gcalEvents.filter(e => { if (seen.has(e.id)) return false; seen.add(e.id); return true; });
    await saveAgenda([...existingAgenda, ...gcalUnicos]);
    renderCalendar();
    showToast(`${gcalUnicos.length} eventos do Google Agenda carregados`, 'success');
  } catch(e) {
    console.warn('Erro ao buscar Google Calendar:', e);
  } finally {
    _fetchGcalLock = false;
  }
}

// Inicializa GIS quando disponível e mostra botão ao mudar de aba
window.addEventListener('load', () => {
  const waitGIS = setInterval(() => {
    if (window.google?.accounts?.oauth2) {
      initGoogleCalendar();
      clearInterval(waitGIS);
    }
  }, 500);
});

// Chamado ao trocar para aba de agenda
const _origSwitchTab = typeof switchTab === 'function' ? switchTab : null;
